<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .generate-pwd-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
        }
        .form-note {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 12px;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <h1>👑 Admin Panel</h1>
            <div class="user-info">
                <span>Welcome, <strong id="adminName"></strong></span>
                <button class="logout-btn" onclick="logoutUser()">Logout</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div id="alert" class="alert"></div>
        
        <div class="dashboard-container">
            <div class="request-form">
                <h3>➕ Create New User</h3>
                <form id="createUserForm" onsubmit="createUser(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required placeholder="e.g., Muhammad Ali">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="e.g., user@company.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="text" id="password" required placeholder="Enter password">
                        <button type="button" class="generate-pwd-btn" onclick="generatePassword()">Generate Strong Password</button>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="role" required>
                            <option value="IT_Executive">IT Executive (Creates requests)</option>
                            <option value="Assistant_Manager">Assistant Manager (Verifies requests)</option>
                            <option value="HOD_IT">HOD IT (Approves requests)</option>
                            <option value="Account_Officer">Account Officer (Processes payment)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Create User</button>
                </form>
                <div class="form-note">
                    💡 User will be automatically created in Firebase Authentication. They can login immediately.
                </div>
            </div>
            
            <div class="stats" id="stats"></div>
            <h3>📋 All Users</h3>
            <div id="usersList"></div>
        </div>
    </div>
    
    <script type="module">
        import { logoutUser } from './js/auth.js';
        import { createUser, loadUsers, deleteUser } from './js/admin.js';
        
        window.logoutUser = logoutUser;
        window.createUser = createUser;
        window.deleteUser = deleteUser;
        window.generatePassword = function() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$';
            let password = '';
            for (let i = 0; i < 10; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').value = password;
        };
        
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) document.getElementById('adminName').textContent = user.fullName;
        
        loadUsers();
    </script>
</body>
</html>
