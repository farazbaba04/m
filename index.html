<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Request Management System | Enterprise Workflow</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
            min-height: 100vh;
        }

        /* Auth Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .auth-card {
            background: rgba(255,255,255,0.98);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            color: #334155;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 0.95rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .auth-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(95deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* Main App */
        .app-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Navbar */
        .navbar {
            background: white;
            border-radius: 1.5rem;
            padding: 0.9rem 2rem;
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .logo h2 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(125deg, #1e293b, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #f8fafc;
            padding: 0.3rem 1rem 0.3rem 1.2rem;
            border-radius: 3rem;
        }

        .role-badge {
            background: #eef2ff;
            color: #1e3a8a;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .logout-btn {
            background: #ef4444;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-card i { font-size: 1.8rem; margin-bottom: 0.3rem; color: #3b82f6; }
        .stat-value { font-size: 1.7rem; font-weight: 700; color: #0f172a; }
        .stat-label { font-size: 0.7rem; color: #475569; }

        /* Admin Panel */
        .admin-panel {
            background: white;
            border-radius: 1.5rem;
            padding: 1.3rem;
            margin-bottom: 1.8rem;
            border-left: 4px solid #f97316;
        }

        .add-user-form {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .add-user-form .input-group {
            margin-bottom: 0;
            flex: 1;
            min-width: 140px;
        }

        .add-user-form .input-group input,
        .add-user-form .input-group select {
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
        }

        .add-user-btn {
            background: #10b981;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 0.8rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .export-btn {
            background: #dc2626;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 0.8rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-left: auto;
        }

        .users-table { overflow-x: auto; margin-top: 1rem; }
        .users-table table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 0.7rem; text-align: left; border-bottom: 1px solid #eef2ff; font-size: 0.85rem; }
        .delete-user-btn { background: #ef4444; border: none; padding: 0.2rem 0.8rem; border-radius: 2rem; color: white; cursor: pointer; }

        /* Timeline */
        .flow-timeline {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .timeline-steps {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .timeline-step {
            flex: 1;
            text-align: center;
            padding: 0.7rem 0.2rem;
            border-radius: 1rem;
            background: #f1f5f9;
        }
        .timeline-step .step-icon { font-size: 1.3rem; margin-bottom: 0.2rem; }
        .timeline-step .step-name { font-size: 0.7rem; font-weight: 600; }
        .timeline-step.active { background: #3b82f6; color: white; }
        .timeline-step.completed { background: #10b981; color: white; }
        .timeline-step.pending { background: #f1f5f9; color: #64748b; }

        /* Request Sections */
        .section-title {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .requests-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .request-item {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            border-left: 4px solid;
            cursor: pointer;
            transition: all 0.2s;
        }
        .request-item:hover { transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .request-item.pending { border-left-color: #f59e0b; }
        .request-item.completed { border-left-color: #10b981; }
        .request-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .request-id { font-weight: 700; color: #1e293b; }
        .request-status { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 2rem; }
        .status-badge-pending { background: #ffedd5; color: #b45309; }
        .status-badge-completed { background: #d1fae5; color: #065f46; }
        .request-desc { font-size: 0.85rem; color: #475569; margin-top: 0.3rem; }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .detail-item {
            background: #f9fafb;
            padding: 0.6rem 0.9rem;
            border-radius: 1rem;
            font-size: 0.85rem;
        }

        .workflow-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }
        .workflow-card {
            background: white;
            border-radius: 1.3rem;
            padding: 1rem;
        }
        textarea {
            width: 100%;
            background: #fafcff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.6rem;
            font-size: 0.8rem;
            resize: vertical;
            margin: 0.5rem 0;
        }
        .action-btn {
            background: #1e40af;
            border: none;
            padding: 0.6rem;
            border-radius: 1rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .events-log {
            background: #0f172a;
            border-radius: 1rem;
            padding: 0.8rem;
            max-height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            color: #86efac;
        }

        @media (max-width: 700px) {
            .app-container { padding: 1rem; }
            .timeline-steps { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- Login Container -->
<div class="auth-container" id="authContainer">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-network-wired" style="font-size: 2.8rem; color: #2563eb;"></i>
            <h1>IT Request Portal</h1>
            <p>SSE → AM → Area Mgr → HOD IT</p>
        </div>
        <div id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="loginEmail" placeholder="user@company.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="auth-btn" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
</div>

<!-- Main App -->
<div class="app-container" id="appContainer">
    <div class="navbar">
        <div class="logo"><h2><i class="fas fa-microchip"></i> IT Workflow Engine</h2></div>
        <div class="user-badge">
            <span><i class="fas fa-user-circle"></i> <span id="userName"></span></span>
            <span class="role-badge" id="userRole"></span>
            <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-hourglass-half"></i><div class="stat-value" id="pendingCount">0</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card"><i class="fas fa-check-double"></i><div class="stat-value" id="completedCount">0</div><div class="stat-label">Completed</div></div>
        <div class="stat-card"><i class="fas fa-receipt"></i><div class="stat-value" id="totalCount">0</div><div class="stat-label">Total Requests</div></div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3><i class="fas fa-shield-alt"></i> Admin Dashboard</h3>
        <div class="add-user-form">
            <div class="input-group"><label>Full Name</label><input type="text" id="newUserName" placeholder="Name"></div>
            <div class="input-group"><label>Email</label><input type="email" id="newUserEmail" placeholder="email@company.com"></div>
            <div class="input-group"><label>Password</label><input type="text" id="newUserPassword" placeholder="temp123"></div>
            <div class="input-group"><label>Role</label>
                <select id="newUserRole">
                    <option value="requester">Requester</option>
                    <option value="sse">SSE IT</option>
                    <option value="am">AM IT</option>
                    <option value="area_manager">Area Manager</option>
                    <option value="hod">HOD IT</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button class="add-user-btn" onclick="addNewUser()"><i class="fas fa-user-plus"></i> Add</button>
            <button class="export-btn" onclick="exportAllToPDF()"><i class="fas fa-file-pdf"></i> Export All to PDF</button>
        </div>
        <div class="users-table" id="usersTable"></div>
    </div>

    <!-- Timeline -->
    <div class="flow-timeline">
        <div class="timeline-steps" id="timelineSteps">
            <div class="timeline-step pending" id="stepReq"><div class="step-icon">📋</div><div class="step-name">Request</div></div>
            <div class="timeline-arrow">→</div>
            <div class="timeline-step pending" id="stepSSE"><div class="step-icon">💻</div><div class="step-name">SSE IT</div></div>
            <div class="timeline-arrow">→</div>
            <div class="timeline-step pending" id="stepAM"><div class="step-icon">📊</div><div class="step-name">AM IT</div></div>
            <div class="timeline-arrow">→</div>
            <div class="timeline-step pending" id="stepArea"><div class="step-icon">🌾</div><div class="step-name">Area Mgr</div></div>
            <div class="timeline-arrow">→</div>
            <div class="timeline-step pending" id="stepHOD"><div class="step-icon">🏛️</div><div class="step-name">HOD IT</div></div>
        </div>
    </div>

    <!-- Create Request -->
    <div class="section-title" id="createRequestCard">
        <h3><i class="fas fa-plus-circle" style="color: #2563eb;"></i> Raise New Request</h3>
    </div>
    <div class="request-card" style="background: white; border-radius: 1.5rem; padding: 1.4rem; margin-bottom: 2rem;">
        <div class="input-group"><label>Description</label><textarea id="requestDesc" rows="2" placeholder="Describe your IT request..."></textarea></div>
        <div class="input-group"><label>Attachment (optional)</label><input type="file" id="fileInput"></div>
        <button class="action-btn" onclick="createRequest()" style="background: linear-gradient(95deg,#0f3b8c,#2563eb);"><i class="fas fa-paper-plane"></i> Submit Request</button>
    </div>

    <!-- All Requests List -->
    <div class="section-title">
        <h3><i class="fas fa-list"></i> All Requests / Complaints</h3>
        <button class="export-btn" onclick="exportAllToPDF()" style="background: #dc2626;"><i class="fas fa-file-pdf"></i> Export PDF</button>
    </div>
    <div class="requests-container" id="allRequestsList"></div>

    <!-- Selected Request Details -->
    <div class="request-card" id="selectedRequestCard" style="display: none; margin-top: 1rem;">
        <div class="request-header"><h3><i class="fas fa-file-alt"></i> Request Details #<span id="selectedReqId"></span></h3></div>
        <div class="detail-grid" id="selectedReqDetails"></div>
        <div class="workflow-grid" id="workflowGrid"></div>
    </div>

    <div class="events-log" id="eventsLog"><div><i class="fas fa-circle-info"></i> System ready</div></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBNFuH14JA0RCrkMhl-37ysgla46QpSJyM",
        authDomain: "faraze-a0339.firebaseapp.com",
        projectId: "faraze-a0339",
        storageBucket: "faraze-a0339.firebasestorage.app",
        messagingSenderId: "463612751566",
        appId: "1:463612751566:web:0e6b1e8367321c4ffbaa9f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();
    
    let currentUser = null;
    let selectedRequest = null;
    let allRequests = [];

    function addLog(msg) {
        const logDiv = document.getElementById('eventsLog');
        const div = document.createElement('div');
        div.innerHTML = `<i class="fas fa-clock"></i> [${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.prepend(div);
        if(logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if(!email || !password) return;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch(e) {
            document.getElementById('loginError').innerText = 'Invalid credentials. Contact admin.';
        }
    }

    async function handleLogout() { await auth.signOut(); location.reload(); }

    window.addNewUser = async () => {
        const name = document.getElementById('newUserName').value;
        const email = document.getElementById('newUserEmail').value;
        const password = document.getElementById('newUserPassword').value;
        const role = document.getElementById('newUserRole').value;
        if(!name || !email || !password) { alert('Fill all fields'); return; }
        if(password.length < 6) { alert('Password 6+ chars'); return; }
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('users').doc(userCred.user.uid).set({ name, email, role, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            addLog(`✅ User created: ${name} (${role})`);
            document.getElementById('newUserName').value = '';
            document.getElementById('newUserEmail').value = '';
            document.getElementById('newUserPassword').value = '';
            loadAllUsers();
        } catch(e) { alert('Error: ' + e.message); }
    };

    window.deleteUser = async (userId) => {
        if(confirm('Delete user?')) {
            await db.collection('users').doc(userId).delete();
            loadAllUsers();
        }
    };

    async function loadAllUsers() {
        const snapshot = await db.collection('users').get();
        let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th></th></tr></thead><tbody>';
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `<tr><td>${data.name}</td><td>${data.email}</td><td>${data.role}</td><td><button class="delete-user-btn" onclick="deleteUser('${doc.id}')"><i class="fas fa-trash"></i> Del</button></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('usersTable').innerHTML = html;
    }

    async function loadStats() {
        const snapshot = await db.collection('requests').get();
        let pending = 0, completed = 0;
        snapshot.forEach(doc => {
            if(doc.data().stage === 'COMPLETED') completed++;
            else pending++;
        });
        document.getElementById('pendingCount').innerText = pending;
        document.getElementById('completedCount').innerText = completed;
        document.getElementById('totalCount').innerText = snapshot.size;
    }

    async function loadAllRequests() {
        const snapshot = await db.collection('requests').orderBy('createdAt', 'desc').get();
        allRequests = [];
        snapshot.forEach(doc => {
            allRequests.push({ id: doc.id, ...doc.data() });
        });
        displayAllRequests();
    }

    function displayAllRequests() {
        const container = document.getElementById('allRequestsList');
        if(!container) return;
        let html = '';
        allRequests.forEach(req => {
            const isCompleted = req.stage === 'COMPLETED';
            const statusClass = isCompleted ? 'status-badge-completed' : 'status-badge-pending';
            const statusText = isCompleted ? '✅ Completed' : `🔄 ${req.stage}`;
            html += `
                <div class="request-item ${isCompleted ? 'completed' : 'pending'}" onclick="selectRequest('${req.id}')">
                    <div class="request-header-row">
                        <span class="request-id"><i class="fas fa-hashtag"></i> ${req.id.slice(0,8)}</span>
                        <span class="request-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="request-header-row">
                        <span style="font-size:0.8rem;"><i class="fas fa-user"></i> ${req.requesterName} | <i class="fas fa-envelope"></i> ${req.requesterEmail}</span>
                        <span style="font-size:0.7rem; color:#64748b;">${req.createdAt ? new Date(req.createdAt.toDate()).toLocaleDateString() : 'Recent'}</span>
                    </div>
                    <div class="request-desc"><i class="fas fa-file-alt"></i> ${req.description.substring(0,100)}${req.description.length > 100 ? '...' : ''}</div>
                </div>
            `;
        });
        if(allRequests.length === 0) html = '<div style="background:white; border-radius:1rem; padding:2rem; text-align:center; color:#64748b;">No requests found. Create your first request!</div>';
        container.innerHTML = html;
    }

    window.selectRequest = async (requestId) => {
        const doc = await db.collection('requests').doc(requestId).get();
        if(doc.exists) {
            selectedRequest = { id: doc.id, ...doc.data() };
            displaySelectedRequest();
        }
    };

    function displaySelectedRequest() {
        if(!selectedRequest) return;
        const req = selectedRequest;
        document.getElementById('selectedRequestCard').style.display = 'block';
        document.getElementById('selectedReqId').innerHTML = `<i class="fas fa-hashtag"></i> ${req.id.slice(0,8)}`;
        
        document.getElementById('selectedReqDetails').innerHTML = `
            <div class="detail-item"><strong>👤 Requester:</strong> ${req.requesterName}</div>
            <div class="detail-item"><strong>📧 Email:</strong> ${req.requesterEmail}</div>
            <div class="detail-item"><strong>📝 Description:</strong> ${req.description}</div>
            <div class="detail-item"><strong>📎 Attachment:</strong> ${req.attachmentUrl ? `<a href="${req.attachmentUrl}" target="_blank">Download</a>` : '—'}</div>
            <div class="detail-item"><strong>💬 SSE:</strong> ${req.sseRemark || '—'}</div>
            <div class="detail-item"><strong>📊 AM:</strong> ${req.amRemark || '—'}</div>
            <div class="detail-item"><strong>🌍 Area Mgr:</strong> ${req.areaRemark || '—'}</div>
            <div class="detail-item"><strong>🏛️ HOD:</strong> ${req.hodRemark || '—'}</div>
        `;
        
        updateTimeline(req.stage);
        
        // Workflow cards for selected request
        const stagesMeta = [
            {key:'sse', label:'SSE IT', icon:'💻', stageFlag:'SSE', remarkField:'sseRemark', next:'→ AM IT'},
            {key:'am', label:'AM IT', icon:'📈', stageFlag:'AM', remarkField:'amRemark', next:'→ Area Mgr'},
            {key:'area', label:'Area Manager', icon:'🌾', stageFlag:'AREA', remarkField:'areaRemark', next:'→ HOD IT'},
            {key:'hod', label:'HOD IT', icon:'🏛️', stageFlag:'HOD', remarkField:'hodRemark', next:'Final Approve'}
        ];
        
        let cardsHtml = '';
        for(let m of stagesMeta) {
            const isCompleted = !!req[m.remarkField];
            const isActive = (req.stage === m.stageFlag) && !isCompleted && req.stage !== 'COMPLETED';
            const canAct = (currentUser?.role === 'admin') || 
                (m.key === 'sse' && currentUser?.role === 'sse' && req.stage === 'SSE') ||
                (m.key === 'am' && currentUser?.role === 'am' && req.stage === 'AM') ||
                (m.key === 'area' && currentUser?.role === 'area_manager' && req.stage === 'AREA') ||
                (m.key === 'hod' && currentUser?.role === 'hod' && req.stage === 'HOD');
            const disabled = (!isActive && !isCompleted) || req.stage === 'COMPLETED' || (isActive && !canAct);
            const existingRemark = isCompleted ? (req[m.remarkField] || '') : '';
            cardsHtml += `
                <div class="workflow-card">
                    <div class="card-header"><span style="font-size:1.6rem;">${m.icon}</span><h3>${m.label}</h3></div>
                    <div class="status ${isCompleted ? 'status-done' : (isActive ? 'status-current' : 'status-locked')}">
                        ${isCompleted ? '✔ Approved' : (isActive ? '⏳ Pending' : '🔒 Locked')}
                    </div>
                    <textarea id="remark_${m.key}" rows="2" placeholder="Remarks..." ${disabled ? 'disabled' : ''}>${existingRemark}</textarea>
                    <button class="action-btn" onclick="submitApprovalForSelected('${m.key}')" ${disabled ? 'disabled' : ''}>
                        <i class="fas fa-check-circle"></i> ${m.next}
                    </button>
                </div>
            `;
        }
        document.getElementById('workflowGrid').innerHTML = cardsHtml;
    }

    window.submitApprovalForSelected = async (level) => {
        if(!selectedRequest) return;
        const remarkElem = document.getElementById(`remark_${level}`);
        if(!remarkElem) return;
        const remark = remarkElem.value.trim();
        if(!remark) { alert('Please enter remarks'); return; }
        
        let updates = {};
        if(level === 'sse') { updates = { sseRemark: remark, stage: 'AM' }; addLog(`SSE approved for ${selectedRequest.id.slice(0,6)}`); }
        else if(level === 'am') { updates = { amRemark: remark, stage: 'AREA' }; addLog(`AM approved`); }
        else if(level === 'area') { updates = { areaRemark: remark, stage: 'HOD' }; addLog(`Area Manager approved`); }
        else if(level === 'hod') { updates = { hodRemark: remark, stage: 'COMPLETED' }; addLog(`✅ HOD approved - Request completed!`); }
        
        await db.collection('requests').doc(selectedRequest.id).update(updates);
        await loadAllRequests();
        await selectRequest(selectedRequest.id);
        loadStats();
    };

    function updateTimeline(stage) {
        const order = ['request', 'SSE', 'AM', 'AREA', 'HOD'];
        const stepMap = { request:'stepReq', SSE:'stepSSE', AM:'stepAM', AREA:'stepArea', HOD:'stepHOD' };
        let stageIdx = order.indexOf(stage);
        if(stage === 'COMPLETED') stageIdx = order.length;
        for(let i=0; i<order.length; i++) {
            const el = document.getElementById(stepMap[order[i]]);
            if(el) {
                if(i < stageIdx) el.className = 'timeline-step completed';
                else if(i === stageIdx && stage !== 'COMPLETED') el.className = 'timeline-step active';
                else el.className = 'timeline-step pending';
            }
        }
    }

    window.createRequest = async () => {
        if(!currentUser) return;
        const description = document.getElementById('requestDesc').value.trim();
        if(!description) { alert('Enter description'); return; }
        
        let attachmentUrl = null;
        const file = document.getElementById('fileInput').files[0];
        if(file) {
            const storageRef = storage.ref(`attachments/${Date.now()}_${file.name}`);
            await storageRef.put(file);
            attachmentUrl = await storageRef.getDownloadURL();
        }
        
        await db.collection('requests').add({
            requesterId: currentUser.uid, requesterName: currentUser.name, requesterEmail: currentUser.email,
            description, attachmentUrl, stage: 'SSE',
            sseRemark: '', amRemark: '', areaRemark: '', hodRemark: '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        addLog(`✅ New request created`);
        document.getElementById('requestDesc').value = '';
        document.getElementById('fileInput').value = '';
        await loadAllRequests();
        loadStats();
    };

    // PDF Export
    window.exportAllToPDF = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        let y = 20;
        doc.setFontSize(18);
        doc.setTextColor(37, 99, 235);
        doc.text('IT Request Management Report', 20, y);
        y += 10;
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 20, y);
        y += 10;
        
        for(let i=0; i<allRequests.length; i++) {
            const req = allRequests[i];
            if(y > 270) {
                doc.addPage();
                y = 20;
            }
            doc.setFontSize(11);
            doc.setTextColor(0, 0, 0);
            doc.setFont(undefined, 'bold');
            doc.text(`Request #${req.id.slice(0,8)}`, 20, y);
            y += 6;
            doc.setFont(undefined, 'normal');
            doc.setFontSize(9);
            doc.text(`Requester: ${req.requesterName} (${req.requesterEmail})`, 20, y);
            y += 5;
            doc.text(`Description: ${req.description.substring(0,80)}`, 20, y);
            y += 5;
            doc.text(`Status: ${req.stage === 'COMPLETED' ? 'COMPLETED' : req.stage}`, 20, y);
            y += 5;
            doc.text(`SSE Remark: ${req.sseRemark || '—'}`, 20, y);
            y += 5;
            doc.text(`AM Remark: ${req.amRemark || '—'}`, 20, y);
            y += 5;
            doc.text(`Area Mgr Remark: ${req.areaRemark || '—'}`, 20, y);
            y += 5;
            doc.text(`HOD Remark: ${req.hodRemark || '—'}`, 20, y);
            y += 8;
            doc.line(20, y-2, 190, y-2);
        }
        
        doc.save(`IT_Requests_${new Date().toISOString().slice(0,19)}.pdf`);
        addLog(`📄 PDF exported with ${allRequests.length} requests`);
    };

    // Auth
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if(!userDoc.exists) { await auth.signOut(); return; }
            currentUser = { uid: user.uid, ...userDoc.data() };
            document.getElementById('userName').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name}`;
            document.getElementById('userRole').innerHTML = `<i class="fas fa-tag"></i> ${currentUser.role.toUpperCase()}`;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            
            if(currentUser.role === 'admin') {
                document.getElementById('adminPanel').style.display = 'block';
                loadAllUsers();
            }
            if(currentUser.role !== 'requester' && currentUser.role !== 'admin') {
                document.getElementById('createRequestCard').style.display = 'none';
            }
            
            await loadAllRequests();
            loadStats();
            addLog(`Welcome ${currentUser.name}`);
        } else {
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        }
    });
</script>
</body>
</html>
