<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&P Express Logistics | IT Complaint Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #fff7ed; font-family: system-ui, 'Segoe UI', 'Inter', sans-serif; }
        .btn-orange { background-color: #f97316; }
        .btn-orange:hover { background-color: #ea580c; }
    </style>
</head>
<body>

<div id="app">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 to-amber-100 px-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center">
                <div class="mx-auto w-20 h-20 bg-gradient-to-br from-orange-500 to-amber-600 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-truck-fast text-white text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold mt-4 text-gray-800">M&P Express Logistics</h2>
                <p class="text-orange-600 font-semibold text-sm">IT Complaint Management Portal</p>
                <p class="text-gray-500 text-xs mt-1">Admin creates SSE / Sr. SSE users</p>
            </div>
            <form id="loginForm" class="mt-6">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-1"><i class="fas fa-user mr-2 text-orange-500"></i>Username</label>
                    <input type="text" id="loginUsername" required class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-400 outline-none">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 font-medium mb-1"><i class="fas fa-lock mr-2 text-orange-500"></i>Password</label>
                    <input type="password" id="loginPassword" required class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-400 outline-none">
                </div>
                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-md"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
            <div class="mt-5 text-xs text-center text-gray-500 border-t pt-4">
                <p class="font-semibold">Default Admin:</p>
                <p>👑 Username: <span class="font-mono bg-gray-100 px-1">admin</span> | Password: <span class="font-mono bg-gray-100 px-1">admin123</span></p>
                <p class="mt-1 text-orange-500">Developed by Faraz Sheikh</p>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardScreen" class="hidden">
        <nav class="bg-white shadow-md sticky top-0 z-20 border-b border-orange-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-truck-fast text-orange-500 text-2xl"></i>
                    <h1 class="text-xl font-bold text-gray-800">M&P Express Logistics</h1>
                    <span class="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded-full">IT Hub</span>
                    <span id="roleBadge" class="text-xs bg-orange-100 text-orange-800 px-2 py-1 rounded-full"></span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="userFullname" class="text-sm font-semibold text-gray-700"></p>
                        <p id="userRoleText" class="text-xs text-gray-500"></p>
                    </div>
                    <button id="logoutBtn" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-100 transition flex gap-2 items-center"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            <div id="dynamicView"></div>
        </main>
        <footer class="text-center text-gray-400 text-xs py-6 border-t mt-10 border-orange-100">
            <p>© 2026 M&P Express Logistics – IT Complaint Portal | Developed by Faraz Sheikh</p>
        </footer>
    </div>
</div>

<script>
    // ---------- DATA STORAGE KEYS ----------
    const STORAGE_USERS = "mp_users";
    const STORAGE_COMPLAINTS = "mp_complaints";
    const STORAGE_CURRENT_USER = "mp_current_user";

    let currentUser = null;
    let users = [];        // all users (admin + SSEs)
    let complaints = [];

    // Helper: save users
    function saveUsers() {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }

    function saveComplaints() {
        localStorage.setItem(STORAGE_COMPLAINTS, JSON.stringify(complaints));
    }

    // Load data from localStorage, initialize if empty
    function loadData() {
        const storedUsers = localStorage.getItem(STORAGE_USERS);
        if (storedUsers) {
            users = JSON.parse(storedUsers);
        } else {
            // default: only admin user
            users = [
                { id: 1, username: "admin", password: "admin123", fullName: "Admin", role: "admin", designation: "Admin" }
            ];
            saveUsers();
        }

        const storedComplaints = localStorage.getItem(STORAGE_COMPLAINTS);
        if (storedComplaints) {
            complaints = JSON.parse(storedComplaints);
        } else {
            complaints = [];
            saveComplaints();
        }
    }

    // Get user by id
    function getUserById(id) {
        return users.find(u => u.id === id) || { fullName: "Unknown", designation: "" };
    }

    // Display name with designation
    function getUserDisplayName(user) {
        if (user.role === 'admin') return `${user.fullName} (${user.designation})`;
        return `${user.fullName} (${user.designation})`;
    }

    // Get all SSE/Sr.SSE users (non-admin)
    function getAllSSEs() {
        return users.filter(u => u.role === 'sse');
    }

    // Login handler
    document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify({ id: user.id, username: user.username, fullName: user.fullName, role: user.role }));
            showDashboard();
        } else {
            alert("Invalid credentials. Use admin/admin123 or a user created by admin.");
        }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
        currentUser = null;
        localStorage.removeItem(STORAGE_CURRENT_USER);
        document.getElementById("dashboardScreen").classList.add("hidden");
        document.getElementById("loginScreen").classList.remove("hidden");
    });

    function showDashboard() {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("dashboardScreen").classList.remove("hidden");
        document.getElementById("userFullname").innerText = currentUser.fullName;
        document.getElementById("userRoleText").innerHTML = currentUser.designation;
        document.getElementById("roleBadge").innerHTML = currentUser.role === "admin" ? '<i class="fas fa-crown mr-1"></i> Admin' : `<i class="fas fa-microchip mr-1"></i> ${currentUser.designation}`;
        renderCurrentView();
    }

    function renderCurrentView() {
        const container = document.getElementById("dynamicView");
        if (currentUser.role === "admin") {
            renderAdminDashboard(container);
        } else {
            renderSSEDashboard(container);
        }
    }

    // UI Helpers
    function statusBadge(status) {
        const colors = { open: "bg-yellow-100 text-yellow-800", "in-progress": "bg-blue-100 text-blue-800", resolved: "bg-green-100 text-green-800", closed: "bg-gray-100 text-gray-800" };
        return `<span class="px-2 py-0.5 rounded-full text-xs ${colors[status] || 'bg-gray-100'}">${status}</span>`;
    }
    function priorityBadge(priority) {
        const colors = { low: "bg-gray-200", medium: "bg-orange-100 text-orange-700", high: "bg-red-100 text-red-700", critical: "bg-red-200 text-red-800" };
        return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${colors[priority]}">${priority}</span>`;
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // ---------- ADMIN DASHBOARD with USER MANAGEMENT ----------
    function renderAdminDashboard(container) {
        let selectedYear = new Date().getFullYear();
        let selectedMonth = new Date().getMonth() + 1;

        // Filter complaints for report
        function getFilteredComplaints() {
            return complaints.filter(c => {
                const d = new Date(c.createdDate);
                return d.getFullYear() === selectedYear && (d.getMonth() + 1) === selectedMonth;
            });
        }

        function generateReportHTML() {
            const filtered = getFilteredComplaints();
            const total = filtered.length;
            const statusCount = { open:0, "in-progress":0, resolved:0, closed:0 };
            const priorityCount = { low:0, medium:0, high:0, critical:0 };
            filtered.forEach(c => {
                statusCount[c.status] = (statusCount[c.status] || 0) + 1;
                priorityCount[c.priority] = (priorityCount[c.priority] || 0) + 1;
            });
            return `
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 border border-orange-200">
                    <div class="flex flex-wrap justify-between items-center border-b pb-4 mb-4">
                        <h3 class="text-xl font-bold text-gray-800"><i class="fas fa-chart-line text-orange-500 mr-2"></i>📅 Month-End Report</h3>
                        <div class="flex gap-3 items-center">
                            <select id="reportMonth" class="border border-orange-200 rounded-lg px-3 py-2 text-sm bg-gray-50">
                                ${Array.from({length:12}, (_,i) => `<option value="${i+1}" ${selectedMonth===i+1 ? 'selected':''}>${new Date(0,i).toLocaleString('default',{month:'long'})}</option>`).join('')}
                            </select>
                            <select id="reportYear" class="border border-orange-200 rounded-lg px-3 py-2 text-sm bg-gray-50">
                                ${[2024,2025,2026].map(y=>`<option value="${y}" ${selectedYear===y?'selected':''}>${y}</option>`).join('')}
                            </select>
                            <button id="refreshReport" class="bg-orange-100 hover:bg-orange-200 text-orange-700 px-4 py-2 rounded-lg text-sm"><i class="fas fa-sync-alt"></i> Update</button>
                            <button id="exportCSV" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-4 py-2 rounded-lg text-sm"><i class="fas fa-download"></i> Export CSV</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-orange-50 p-3 rounded-xl"><p class="text-xs text-gray-500">Total Complaints</p><p class="text-2xl font-bold text-orange-700">${total}</p></div>
                        <div class="bg-amber-50 p-3 rounded-xl"><p class="text-xs text-gray-500">Open + In-progress</p><p class="text-2xl font-bold text-amber-700">${(statusCount.open||0)+(statusCount["in-progress"]||0)}</p></div>
                        <div class="bg-green-50 p-3 rounded-xl"><p class="text-xs text-gray-500">Resolved/Closed</p><p class="text-2xl font-bold text-green-700">${(statusCount.resolved||0)+(statusCount.closed||0)}</p></div>
                        <div class="bg-red-50 p-3 rounded-xl"><p class="text-xs text-gray-500">Critical Priority</p><p class="text-2xl font-bold text-red-700">${priorityCount.critical||0}</p></div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm">
                            <thead class="bg-orange-50"><tr><th class="px-3 py-2 text-left">ID</th><th>Title</th><th>Assigned To</th><th>Priority</th><th>Status</th><th>Created Date</th></tr></thead>
                            <tbody>
                                ${filtered.map(c => {
                                    const assignee = getUserById(c.assignedTo);
                                    return `<tr class="border-b"><td class="px-3 py-2 font-mono text-xs">#${c.id}</td><td class="px-3 py-2">${escapeHtml(c.title)}</td><td class="px-3 py-2">${getUserDisplayName(assignee)}</td><td class="px-3 py-2">${priorityBadge(c.priority)}</td><td class="px-3 py-2">${statusBadge(c.status)}</td><td class="px-3 py-2">${new Date(c.createdDate).toLocaleDateString()}</td></tr>`;
                                }).join('')}
                                ${filtered.length === 0 ? '<tr><td colspan="6" class="text-center py-6 text-gray-400">No complaints in this month</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderComplaintTable() {
            if (complaints.length === 0) return `<div class="bg-white rounded-xl p-10 text-center text-gray-400">No complaints yet. Click "New Complaint" to add.</div>`;
            return `
                <div class="bg-white rounded-2xl shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-orange-50"><tr><th class="px-5 py-3 text-left text-xs">ID</th><th>Title</th><th>Assigned To</th><th>Priority</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${complaints.map(c => {
                                const assignee = getUserById(c.assignedTo);
                                return `<tr class="hover:bg-orange-50 transition">
                                    <td class="px-5 py-3 text-xs font-mono">${c.id}</td>
                                    <td class="px-5 py-3 font-medium">${escapeHtml(c.title)}<div class="text-xs text-gray-400 truncate w-48">${escapeHtml(c.description.substring(0,50))}</div></td>
                                    <td class="px-5 py-3">${getUserDisplayName(assignee)}</td>
                                    <td class="px-5 py-3">${priorityBadge(c.priority)}</td>
                                    <td class="px-5 py-3">${statusBadge(c.status)}</td>
                                    <td class="px-5 py-3 text-xs">${new Date(c.createdDate).toLocaleDateString()}</td>
                                    <td class="px-5 py-3 flex gap-2">
                                        <button data-id="${c.id}" class="editBtn text-orange-600 hover:text-orange-800"><i class="fas fa-edit"></i></button>
                                        <button data-id="${c.id}" class="deleteBtn text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderUserManagement() {
            const sseUsers = users.filter(u => u.role === 'sse');
            return `
                <div class="bg-white rounded-2xl shadow p-6 mb-8 border border-orange-200">
                    <h3 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-users text-orange-500 mr-2"></i>Manage SSE / Sr. SSE Users</h3>
                    <form id="createUserForm" class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
                        <input type="text" id="newFullName" placeholder="Full Name" required class="border rounded-lg p-2 focus:ring-orange-400">
                        <input type="text" id="newUsername" placeholder="Username" required class="border rounded-lg p-2 focus:ring-orange-400">
                        <input type="text" id="newPassword" placeholder="Password" required class="border rounded-lg p-2 focus:ring-orange-400">
                        <select id="newDesignation" class="border rounded-lg p-2">
                            <option value="SSE">SSE</option>
                            <option value="Sr. SSE">Sr. SSE</option>
                        </select>
                        <button type="submit" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 col-span-1"><i class="fas fa-user-plus"></i> Create User</button>
                    </form>
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm">
                            <thead class="bg-gray-100"><tr><th class="px-3 py-2 text-left">Full Name</th><th>Username</th><th>Designation</th><th>Actions</th></tr></thead>
                            <tbody id="userListBody">
                                ${sseUsers.map(u => `
                                    <tr class="border-b">
                                        <td class="px-3 py-2">${escapeHtml(u.fullName)}</td>
                                        <td class="px-3 py-2">${escapeHtml(u.username)}</td>
                                        <td class="px-3 py-2">${u.designation}</td>
                                        <td class="px-3 py-2"><button data-id="${u.id}" class="deleteUserBtn text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i> Delete</button></td>
                                    </tr>
                                `).join('')}
                                ${sseUsers.length === 0 ? '<tr><td colspan="4" class="text-center py-4 text-gray-400">No SSE users yet. Create one above.</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function refreshUI() {
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="flex flex-wrap justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-list-ul text-orange-500 mr-2"></i>All Complaints</h2>
                        <button id="newComplaintBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-xl shadow flex gap-2 transition"><i class="fas fa-plus"></i> New Complaint</button>
                    </div>
                    <div id="reportArea"></div>
                    <div id="complaintTableArea"></div>
                    <div id="userManagementArea"></div>
                </div>
            `;
            document.getElementById("reportArea").innerHTML = generateReportHTML();
            document.getElementById("complaintTableArea").innerHTML = renderComplaintTable();
            document.getElementById("userManagementArea").innerHTML = renderUserManagement();

            // Event listeners
            document.getElementById("refreshReport")?.addEventListener("click", () => {
                selectedMonth = parseInt(document.getElementById("reportMonth").value);
                selectedYear = parseInt(document.getElementById("reportYear").value);
                document.getElementById("reportArea").innerHTML = generateReportHTML();
                attachReportButtons();
            });
            document.getElementById("exportCSV")?.addEventListener("click", () => exportCSV(selectedYear, selectedMonth));
            document.getElementById("newComplaintBtn")?.addEventListener("click", () => openComplaintModal());
            document.querySelectorAll(".editBtn").forEach(btn => btn.addEventListener("click", () => {
                const id = parseInt(btn.dataset.id);
                const comp = complaints.find(c => c.id === id);
                if(comp) openComplaintModal(comp);
            }));
            document.querySelectorAll(".deleteBtn").forEach(btn => btn.addEventListener("click", async () => {
                const id = parseInt(btn.dataset.id);
                if(confirm("Permanently delete this complaint?")) {
                    complaints = complaints.filter(c => c.id !== id);
                    saveComplaints();
                    refreshUI();
                }
            }));
            attachReportButtons();

            // Create user form
            document.getElementById("createUserForm")?.addEventListener("submit", (e) => {
                e.preventDefault();
                const fullName = document.getElementById("newFullName").value.trim();
                const username = document.getElementById("newUsername").value.trim();
                const password = document.getElementById("newPassword").value.trim();
                const designation = document.getElementById("newDesignation").value;
                if (!fullName || !username || !password) {
                    alert("Please fill all fields");
                    return;
                }
                if (users.find(u => u.username === username)) {
                    alert("Username already exists");
                    return;
                }
                const newId = Date.now();
                const newUser = {
                    id: newId,
                    username: username,
                    password: password,
                    fullName: fullName,
                    role: "sse",
                    designation: designation
                };
                users.push(newUser);
                saveUsers();
                refreshUI();
                document.getElementById("createUserForm").reset();
            });

            // Delete user buttons
            document.querySelectorAll(".deleteUserBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const userId = parseInt(btn.dataset.id);
                    if (confirm("Delete this user? All complaints assigned to them will become unassigned (set to admin).")) {
                        // Reassign complaints assigned to this user to admin (id=1)
                        complaints.forEach(c => {
                            if (c.assignedTo === userId) c.assignedTo = 1;
                        });
                        users = users.filter(u => u.id !== userId);
                        saveUsers();
                        saveComplaints();
                        refreshUI();
                    }
                });
            });
        }

        function attachReportButtons() {
            document.getElementById("refreshReport")?.addEventListener("click", () => {});
            document.getElementById("exportCSV")?.addEventListener("click", () => exportCSV(selectedYear, selectedMonth));
        }

        function exportCSV(year, month) {
            const filtered = complaints.filter(c => {
                const d = new Date(c.createdDate);
                return d.getFullYear() === year && (d.getMonth() + 1) === month;
            });
            if(filtered.length === 0) { alert("No data for this month."); return; }
            let csvRows = [["ID","Title","Description","Assigned SSE","Designation","Priority","Status","Created Date","Due Date"]];
            filtered.forEach(c => {
                const sse = getUserById(c.assignedTo);
                csvRows.push([c.id, c.title, c.description.replace(/,/g,';'), sse.fullName, sse.designation, c.priority, c.status, new Date(c.createdDate).toLocaleString(), c.dueDate || 'N/A']);
            });
            const csvContent = csvRows.map(row => row.join(",")).join("\n");
            const blob = new Blob([csvContent], {type: "text/csv"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `MP_Complaints_${year}_${month}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        refreshUI();
    }

    // ---------- SSE DASHBOARD ----------
    function renderSSEDashboard(container) {
        const myComplaints = complaints.filter(c => c.assignedTo === currentUser.id);

        function updateStatus(compId, newStatus) {
            const idx = complaints.findIndex(c => c.id === compId);
            if(idx !== -1) {
                complaints[idx].status = newStatus;
                saveComplaints();
                renderSSEDashboard(container);
            }
        }

        container.innerHTML = `
            <div class="space-y-6">
                <div class="bg-gradient-to-r from-orange-50 to-white p-5 rounded-2xl shadow flex flex-wrap justify-between items-center border border-orange-100">
                    <div>
                        <h2 class="text-2xl font-bold"><i class="fas fa-tasks text-orange-500 mr-2"></i>My Assigned Complaints</h2>
                        <p class="text-gray-500">Update status & resolve tickets</p>
                    </div>
                    <button id="sseNewComplaintBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-xl shadow flex gap-2 items-center transition"><i class="fas fa-plus-circle"></i> Create & Assign Complaint</button>
                </div>
                <div class="bg-white rounded-2xl shadow overflow-hidden">
                    ${myComplaints.length === 0 ? '<div class="p-10 text-center text-gray-400">No complaints assigned to you yet.</div>' : `
                    <table class="min-w-full divide-y">
                        <thead class="bg-orange-50"><tr><th class="px-5 py-3 text-left">ID</th><th>Title</th><th>Priority</th><th>Status</th><th>Created</th><th>Update Status</th></tr></thead>
                        <tbody>
                            ${myComplaints.map(c => `
                                <tr class="border-b hover:bg-orange-50 transition">
                                    <td class="px-5 py-3 text-xs font-mono">${c.id}</td>
                                    <td class="px-5 py-3"><div class="font-medium">${escapeHtml(c.title)}</div><div class="text-xs text-gray-400">${escapeHtml(c.description.substring(0,60))}</div></td>
                                    <td class="px-5 py-3">${priorityBadge(c.priority)}</td>
                                    <td class="px-5 py-3">${statusBadge(c.status)}</td>
                                    <td class="px-5 py-3 text-xs">${new Date(c.createdDate).toLocaleDateString()}</td>
                                    <td class="px-5 py-3">
                                        <select data-id="${c.id}" class="statusSelect border border-orange-200 rounded-lg px-2 py-1 text-sm bg-white">
                                            <option ${c.status==='open' ? 'selected' : ''}>open</option>
                                            <option ${c.status==='in-progress' ? 'selected' : ''}>in-progress</option>
                                            <option ${c.status==='resolved' ? 'selected' : ''}>resolved</option>
                                            <option ${c.status==='closed' ? 'selected' : ''}>closed</option>
                                        </select>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    `}
                </div>
            </div>
        `;

        document.querySelectorAll(".statusSelect").forEach(select => {
            select.addEventListener("change", (e) => {
                const compId = parseInt(select.dataset.id);
                updateStatus(compId, select.value);
            });
        });

        document.getElementById("sseNewComplaintBtn")?.addEventListener("click", () => openComplaintModal());
    }

    // ---------- SHARED COMPLAINT MODAL (assign to any SSE) ----------
    function openComplaintModal(complaint = null) {
        const isEdit = !!complaint;
        const sseList = getAllSSEs();
        const modalDiv = document.createElement("div");
        modalDiv.className = "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4";
        modalDiv.innerHTML = `
            <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border-t-4 border-orange-500">
                <div class="flex justify-between items-center border-b pb-3 mb-4">
                    <h3 class="text-xl font-bold text-gray-800"><i class="fas fa-ticket-alt text-orange-500 mr-2"></i>${isEdit ? 'Edit Complaint' : 'New Complaint'}</h3>
                    <button id="closeModalBtn"><i class="fas fa-times text-gray-400 hover:text-gray-600"></i></button>
                </div>
                <form id="modalComplaintForm">
                    <input type="hidden" id="compId" value="${complaint?.id || ''}">
                    <div class="mb-3"><label class="block text-sm font-semibold">Title *</label><input type="text" id="compTitle" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-orange-400" value="${escapeHtml(complaint?.title || '')}"></div>
                    <div class="mb-3"><label class="block text-sm font-semibold">Description</label><textarea id="compDesc" rows="2" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-orange-400">${escapeHtml(complaint?.description || '')}</textarea></div>
                    <div class="mb-3"><label class="block text-sm font-semibold">Assign to SSE</label><select id="compAssignedTo" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-orange-400">
                        ${sseList.map(s => `<option value="${s.id}" ${complaint && complaint.assignedTo === s.id ? 'selected':''}>${s.fullName} (${s.designation})</option>`).join('')}
                        ${sseList.length === 0 ? '<option disabled>No SSE users created yet. Ask admin to create users.</option>' : ''}
                    </select></div>
                    <div class="mb-3"><label class="block text-sm font-semibold">Priority</label><select id="compPriority" class="w-full border border-gray-300 rounded-lg p-2">
                        <option ${complaint?.priority==='low'?'selected':''}>low</option>
                        <option ${complaint?.priority==='medium'?'selected':''}>medium</option>
                        <option ${complaint?.priority==='high'?'selected':''}>high</option>
                        <option ${complaint?.priority==='critical'?'selected':''}>critical</option>
                    </select></div>
                    <div class="mb-3"><label class="block text-sm font-semibold">Status</label><select id="compStatus" class="w-full border border-gray-300 rounded-lg p-2">
                        <option ${complaint?.status==='open'?'selected':''}>open</option>
                        <option ${complaint?.status==='in-progress'?'selected':''}>in-progress</option>
                        <option ${complaint?.status==='resolved'?'selected':''}>resolved</option>
                        <option ${complaint?.status==='closed'?'selected':''}>closed</option>
                    </select></div>
                    <div class="mb-4"><label class="block text-sm font-semibold">Due Date</label><input type="date" id="compDueDate" class="w-full border border-gray-300 rounded-lg p-2" value="${complaint?.dueDate?.split('T')[0] || ''}"></div>
                    <div class="flex justify-end gap-3">
                        <button type="button" id="cancelModal" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100">Cancel</button>
                        <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-lg transition">${isEdit ? 'Update' : 'Create'}</button>
                    </div>
                </form>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const closeModal = () => modalDiv.remove();
        document.getElementById("closeModalBtn")?.addEventListener("click", closeModal);
        document.getElementById("cancelModal")?.addEventListener("click", closeModal);
        document.getElementById("modalComplaintForm")?.addEventListener("submit", (e) => {
            e.preventDefault();
            const id = document.getElementById("compId").value;
            const assignedTo = parseInt(document.getElementById("compAssignedTo").value);
            if (isNaN(assignedTo)) {
                alert("Please select a valid SSE user (create users first in admin panel).");
                return;
            }
            const newComplaint = {
                title: document.getElementById("compTitle").value,
                description: document.getElementById("compDesc").value,
                assignedTo: assignedTo,
                priority: document.getElementById("compPriority").value,
                status: document.getElementById("compStatus").value,
                dueDate: document.getElementById("compDueDate").value || null,
                createdDate: complaint?.createdDate || new Date().toISOString(),
                id: id ? parseInt(id) : Date.now() + Math.floor(Math.random() * 10000)
            };
            if (id) {
                const index = complaints.findIndex(c => c.id === parseInt(id));
                if(index !== -1) complaints[index] = { ...complaints[index], ...newComplaint };
            } else {
                complaints.push(newComplaint);
            }
            saveComplaints();
            closeModal();
            renderCurrentView();
        });
    }

    // Auto restore session and load data
    (function init() {
        loadData();  // loads users and complaints from storage
        const savedUser = localStorage.getItem(STORAGE_CURRENT_USER);
        if (savedUser) {
            try {
                const parsed = JSON.parse(savedUser);
                const found = users.find(u => u.id === parsed.id);
                if (found) {
                    currentUser = found;
                    showDashboard();
                } else {
                    document.getElementById("loginScreen").classList.remove("hidden");
                }
            } catch(e) { console.warn(e); }
        } else {
            document.getElementById("loginScreen").classList.remove("hidden");
        }
    })();
</script>
</body>
</html>
