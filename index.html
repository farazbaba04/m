<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>M&P Express | Intelligent Task Hub</title>
    <!-- Tailwind + Font Awesome + Google Fonts + Chart.js + jsPDF -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0B1120; }
        /* Glass morphism effect for cards */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 1.5rem;
        }
        .sidebar-link {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0.75rem;
        }
        .sidebar-link:hover {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            transform: translateX(4px);
        }
        .task-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.4);
        }
        .btn-glow {
            box-shadow: 0 0 8px rgba(249,115,22,0.5);
        }
        .toast-notify {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-size: 0.875rem;
            z-index: 9999;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            border-left: 3px solid #f97316;
        }
        .loading-spinner {
            border: 3px solid #334155;
            border-top: 3px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        input, select, textarea {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #f97316;
            outline: none;
            box-shadow: 0 0 0 2px rgba(249,115,22,0.3);
        }
        .modal-backdrop {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-950">

    <!-- LOGIN PANEL -->
    <div id="authPanel" class="min-h-screen flex items-center justify-center px-4">
        <div class="glass-card w-full max-w-md p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-flex p-3 bg-orange-500/20 rounded-full mb-3">
                    <i class="fas fa-truck-fast text-4xl text-orange-500"></i>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-tight">M&P Express</h2>
                <p class="text-gray-400 text-sm mt-1">Task & Complaint Intelligence</p>
                <div id="initStatus" class="mt-3 text-xs text-gray-400 bg-gray-800/50 p-2 rounded-xl"></div>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-300 text-sm font-medium mb-1">Email</label>
                    <input type="email" id="loginEmail" class="w-full px-4 py-2.5 text-white" placeholder="admin@mulphilog.com">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-300 text-sm font-medium mb-1">Password</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-2.5 text-white" placeholder="••••••">
                </div>
                <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg">Sign In</button>
            </form>
            <div class="text-center mt-5">
                <button id="manualCreateAdmin" class="text-orange-400 text-sm underline hover:text-orange-300">⟳ Initialize System</button>
            </div>
            <div class="mt-8 pt-4 border-t border-gray-700 text-center text-xs text-gray-500">
                Developed by <span class="text-orange-500 font-semibold">Fraaz Sheikh</span> & Team
            </div>
        </div>
    </div>

    <!-- MAIN APP (SIDEBAR + CONTENT) -->
    <div id="appRoot" class="hidden flex min-h-screen">
        <!-- SIDEBAR -->
        <aside class="fixed inset-y-0 left-0 w-72 bg-gray-900/90 backdrop-blur-md border-r border-gray-800 shadow-2xl z-30 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-truck-fast text-2xl text-orange-500"></i>
                    <span class="text-xl font-bold text-white">M&P Express</span>
                </div>
                <p class="text-xs text-gray-400 mt-1">Task Management Suite</p>
            </div>
            <nav class="flex-1 p-4 space-y-1.5">
                <!-- Admin only -->
                <div id="adminNavGroup" class="space-y-1.5 hidden">
                    <a href="#" data-view="team" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-gray-300"><i class="fas fa-users w-5"></i><span>Team Management</span></a>
                    <a href="#" data-view="allTasksAdmin" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-gray-300"><i class="fas fa-list-check w-5"></i><span>All Tasks (Admin)</span></a>
                    <a href="#" data-view="analytics" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-gray-300"><i class="fas fa-chart-line w-5"></i><span>Analytics</span></a>
                    <a href="#" data-view="report" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-gray-300"><i class="fas fa-file-pdf w-5"></i><span>Monthly Report</span></a>
                </div>
                <!-- User & common -->
                <div id="userNavGroup" class="space-y-1.5 hidden">
                    <a href="#" data-view="allTasksUser" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-gray-300"><i class="fas fa-globe w-5"></i><span>All Tasks</span></a>
                    <a href="#" data-view="myAssigned" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-gray-300"><i class="fas fa-tasks w-5"></i><span>My Tasks</span></a>
                    <a href="#" data-view="myStats" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-gray-300"><i class="fas fa-chart-simple w-5"></i><span>My Performance</span></a>
                </div>
                <div class="pt-4"><hr class="border-gray-800"></div>
                <a href="#" data-view="addTask" class="sidebar-link flex items-center space-x-3 px-4 py-2.5 text-orange-300 bg-orange-500/10"><i class="fas fa-plus-circle w-5"></i><span>+ Create New Task</span></a>
            </nav>
            <div class="p-5 border-t border-gray-800">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-user-circle text-gray-400 text-xl"></i>
                        <span id="sidebarUserName" class="text-sm text-gray-300 font-medium"></span>
                    </div>
                    <button id="logoutBtn" class="text-red-400 hover:text-red-300 transition"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="mt-2 text-xs text-gray-500">© 2025 M&P Express</div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 ml-72">
            <header class="sticky top-0 z-20 bg-gray-900/80 backdrop-blur-md border-b border-gray-800 px-8 py-4 flex justify-between items-center">
                <h1 id="pageTitle" class="text-xl font-bold text-white">Dashboard</h1>
                <div class="flex items-center space-x-3">
                    <span id="topUserName" class="text-sm text-gray-300"></span>
                    <span id="roleBadge" class="px-3 py-1 text-xs rounded-full bg-orange-500/20 text-orange-400 font-medium"></span>
                </div>
            </header>
            <div class="p-6 md:p-8" id="dynamicContent">
                <div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, orderBy, addDoc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUWw4CWZbL35zpQn4FA1m_fsJj95FpOec",
            authDomain: "itcomplaint-4ec8e.firebaseapp.com",
            projectId: "itcomplaint-4ec8e",
            storageBucket: "itcomplaint-4ec8e.firebasestorage.app",
            messagingSenderId: "718572872389",
            appId: "1:718572872389:web:653b63ac93d07be9f2c6ac",
            measurementId: "G-PS1HC2MH6G"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, currentRole = null;
        let allUsersCache = [];

        // DOM refs
        const authPanel = document.getElementById('authPanel');
        const appRoot = document.getElementById('appRoot');
        const loginForm = document.getElementById('loginForm');
        const initStatus = document.getElementById('initStatus');
        const sidebarUserName = document.getElementById('sidebarUserName');
        const topUserName = document.getElementById('topUserName');
        const roleBadge = document.getElementById('roleBadge');
        const pageTitle = document.getElementById('pageTitle');
        const dynamicContent = document.getElementById('dynamicContent');
        const adminNavGroup = document.getElementById('adminNavGroup');
        const userNavGroup = document.getElementById('userNavGroup');
        const logoutBtn = document.getElementById('logoutBtn');

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast-notify ${isError ? 'border-red-500' : 'border-orange-500'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // fetch all users
        async function refreshUsers() {
            const snap = await getDocs(collection(db, "users"));
            allUsersCache = [];
            snap.forEach(d => allUsersCache.push({ uid: d.id, ...d.data() }));
        }

        // Auto-create admin (admin@mulphilog.com / 090078601)
        async function ensureAdmin() {
            initStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Initializing system...';
            try {
                const adminQuery = query(collection(db, "users"), where("role", "==", "admin"));
                const existing = await getDocs(adminQuery);
                if (!existing.empty) {
                    initStatus.innerHTML = '✅ System ready.';
                    return true;
                }
                const adminEmail = "admin@mulphilog.com";
                const adminPass = "090078601";
                let uid = null;
                try {
                    const cred = await createUserWithEmailAndPassword(auth, adminEmail, adminPass);
                    uid = cred.user.uid;
                } catch (err) {
                    if (err.code === 'auth/email-already-in-use') {
                        const sign = await signInWithEmailAndPassword(auth, adminEmail, adminPass);
                        uid = sign.user.uid;
                        await auth.signOut();
                    } else throw err;
                }
                if (uid) {
                    await setDoc(doc(db, "users", uid), {
                        email: adminEmail, name: "System Admin", role: "admin", createdAt: Timestamp.now()
                    });
                    initStatus.innerHTML = '✅ Admin ready.';
                    showToast("Default admin created: admin@mulphilog.com");
                }
                return true;
            } catch (err) {
                initStatus.innerHTML = `⚠️ ${err.message.substring(0, 80)}`;
                return false;
            }
        }
        document.getElementById('manualCreateAdmin')?.addEventListener('click', () => ensureAdmin());

        // get user role
        async function getUserRole(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            return snap.exists() ? snap.data().role : null;
        }

        // navigation handler
        function bindNavigation() {
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.removeEventListener('click', link._handler);
                const handler = (e) => {
                    e.preventDefault();
                    const view = link.dataset.view;
                    if (view === 'addTask') renderCreateTask();
                    else if (currentRole === 'admin') {
                        if (view === 'team') renderTeamManagement();
                        else if (view === 'allTasksAdmin') renderAdminAllTasks();
                        else if (view === 'analytics') renderAdminAnalytics();
                        else if (view === 'report') renderMonthlyReport();
                    } else {
                        if (view === 'allTasksUser') renderUserAllTasksReadonly();
                        else if (view === 'myAssigned') renderMyAssignedTasks();
                        else if (view === 'myStats') renderUserStats();
                    }
                };
                link.addEventListener('click', handler);
                link._handler = handler;
            });
        }

        // Auth state
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const role = await getUserRole(user.uid);
                if (!role) { await signOut(auth); showToast("Invalid account", true); return; }
                currentUser = user;
                currentRole = role;
                await refreshUsers();
                const userData = allUsersCache.find(u => u.uid === user.uid);
                const displayName = userData?.name || userData?.email || "User";
                sidebarUserName.innerText = displayName;
                topUserName.innerText = displayName;
                roleBadge.innerText = role === 'admin' ? 'Administrator' : 'Team Member';
                authPanel.classList.add('hidden');
                appRoot.classList.remove('hidden');
                if (role === 'admin') {
                    adminNavGroup.classList.remove('hidden');
                    userNavGroup.classList.add('hidden');
                    pageTitle.innerText = "Admin Control Hub";
                    renderAdminAllTasks();
                } else {
                    userNavGroup.classList.remove('hidden');
                    adminNavGroup.classList.add('hidden');
                    pageTitle.innerText = "Team Workspace";
                    renderUserAllTasksReadonly();
                }
                bindNavigation();
            } else {
                authPanel.classList.remove('hidden');
                appRoot.classList.add('hidden');
                ensureAdmin();
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
                showToast("Welcome back!");
            } catch (err) { alert("Invalid credentials"); }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        // ====================== RENDER FUNCTIONS ======================
        async function renderCreateTask() {
            await refreshUsers();
            const userOptions = allUsersCache.map(u => `<option value="${u.uid}">${u.name || u.email} (${u.role})</option>`).join('');
            dynamicContent.innerHTML = `
                <div class="max-w-3xl mx-auto glass-card p-8">
                    <h2 class="text-2xl font-bold text-white mb-6 flex items-center"><i class="fas fa-plus-circle text-orange-500 mr-3"></i>Create New Task</h2>
                    <div class="space-y-5">
                        <div><label class="text-gray-300 text-sm">Task Description *</label><input id="taskDesc" class="w-full p-3 text-white" placeholder="Describe the task / complaint"></div>
                        <div><label class="text-gray-300 text-sm">Assign To</label><select id="assignedTo" class="w-full p-3 text-white">${userOptions}</select></div>
                        <div><label class="text-gray-300 text-sm">Due Date</label><input type="date" id="taskDate" class="w-full p-3 text-white" value="${new Date().toISOString().slice(0,10)}"></div>
                        <div><label class="text-gray-300 text-sm">Status</label><select id="taskStatus" class="w-full p-3 text-white"><option value="false">Pending</option><option value="true">Resolved</option></select></div>
                        <div><label class="text-gray-300 text-sm">Notes</label><textarea id="taskNotes" rows="3" class="w-full p-3 text-white"></textarea></div>
                        <button id="saveTaskBtn" class="w-full bg-orange-600 hover:bg-orange-500 py-3 rounded-xl font-semibold transition">Create Task</button>
                        <div id="taskFeedback" class="text-sm"></div>
                    </div>
                </div>`;
            document.getElementById('saveTaskBtn').addEventListener('click', async () => {
                const desc = document.getElementById('taskDesc').value.trim();
                if (!desc) { document.getElementById('taskFeedback').innerHTML = '<span class="text-red-400">Description required</span>'; return; }
                try {
                    await addDoc(collection(db, "tasks"), {
                        description: desc,
                        assignedTo: document.getElementById('assignedTo').value,
                        assignedBy: currentUser.uid,
                        date: document.getElementById('taskDate').value,
                        status: document.getElementById('taskStatus').value === 'true',
                        notes: document.getElementById('taskNotes').value,
                        createdAt: Timestamp.now()
                    });
                    showToast("Task created");
                    document.getElementById('taskDesc').value = "";
                    document.getElementById('taskFeedback').innerHTML = '<span class="text-green-400">✓ Task added</span>';
                    if (currentRole === 'admin') renderAdminAllTasks(); else renderUserAllTasksReadonly();
                } catch (err) { document.getElementById('taskFeedback').innerHTML = `<span class="text-red-400">${err.message}</span>`; }
            });
        }

        // ADMIN: view all tasks with toggle
        async function renderAdminAllTasks() {
            dynamicContent.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold text-white mb-4"><i class="fas fa-tasks text-orange-500 mr-2"></i>All Tasks (Admin Control)</h2><div id="adminTasksContainer" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2"></div></div>`;
            await loadAllTasksAdmin();
        }
        async function loadAllTasksAdmin() {
            const snap = await getDocs(query(collection(db, "tasks"), orderBy("date", "desc")));
            const tasks = []; snap.forEach(d => tasks.push({ id: d.id, ...d.data() }));
            const container = document.getElementById('adminTasksContainer');
            if (!tasks.length) { container.innerHTML = '<div class="text-gray-400 text-center py-12">No tasks yet. Create one.</div>'; return; }
            const userMap = Object.fromEntries(allUsersCache.map(u => [u.uid, u.name || u.email]));
            container.innerHTML = tasks.map(t => `
                <div class="task-card p-4 rounded-xl ${t.status ? 'border-green-500/30 bg-green-950/20' : 'border-orange-500/30 bg-orange-950/10'} shadow-md">
                    <div class="flex flex-wrap justify-between gap-3">
                        <div class="flex-1">
                            <p class="font-bold text-white text-lg">${escapeHtml(t.description)}</p>
                            <div class="flex flex-wrap gap-3 mt-2 text-xs text-gray-400">
                                <span><i class="fas fa-user-check mr-1"></i>Assign: ${userMap[t.assignedTo] || '?'}</span>
                                <span><i class="fas fa-calendar-alt mr-1"></i>Due: ${t.date}</span>
                                <span><i class="fas fa-sticky-note"></i> ${t.notes || 'No notes'}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="px-3 py-1 rounded-full text-xs font-medium ${t.status ? 'bg-green-600 text-white' : 'bg-orange-600 text-white'}">${t.status ? 'RESOLVED' : 'PENDING'}</span>
                            <button data-id="${t.id}" data-status="${!t.status}" class="adminToggleBtn bg-blue-600/80 hover:bg-blue-500 px-3 py-1.5 rounded-lg text-xs text-white transition"><i class="fas fa-sync-alt mr-1"></i>Toggle</button>
                        </div>
                    </div>
                </div>`).join('');
            document.querySelectorAll('.adminToggleBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await updateDoc(doc(db, "tasks", btn.dataset.id), { status: btn.dataset.status === 'true' });
                    showToast("Status updated");
                    loadAllTasksAdmin();
                });
            });
        }

        // USER: view all tasks (read-only)
        async function renderUserAllTasksReadonly() {
            dynamicContent.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold text-white mb-4"><i class="fas fa-globe text-orange-500 mr-2"></i>All Team Tasks (Read Only)</h2><div id="userAllTasksContainer" class="space-y-3 max-h-[70vh] overflow-y-auto"></div></div>`;
            const snap = await getDocs(query(collection(db, "tasks"), orderBy("date", "desc")));
            const tasks = []; snap.forEach(d => tasks.push({ id: d.id, ...d.data() }));
            const container = document.getElementById('userAllTasksContainer');
            if (!tasks.length) { container.innerHTML = '<div class="text-gray-400 text-center py-12">No tasks yet.</div>'; return; }
            const userMap = Object.fromEntries(allUsersCache.map(u => [u.uid, u.name || u.email]));
            container.innerHTML = tasks.map(t => `
                <div class="task-card p-4 rounded-xl ${t.status ? 'border-green-500/30 bg-green-950/20' : 'border-orange-500/30 bg-orange-950/10'}">
                    <div class="flex flex-wrap justify-between gap-3">
                        <div>
                            <p class="font-bold text-white">${escapeHtml(t.description)}</p>
                            <div class="flex flex-wrap gap-3 mt-2 text-xs text-gray-400">
                                <span><i class="fas fa-user-check"></i> ${userMap[t.assignedTo] || '?'}</span>
                                <span><i class="fas fa-calendar-alt"></i> ${t.date}</span>
                                <span><i class="fas fa-comment"></i> ${t.notes || '-'}</span>
                            </div>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${t.status ? 'bg-green-600' : 'bg-orange-600'} text-white">${t.status ? 'RESOLVED' : 'PENDING'}</span>
                    </div>
                </div>`).join('');
        }

        // USER: my assigned tasks (can resolve)
        async function renderMyAssignedTasks() {
            dynamicContent.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold text-white mb-4"><i class="fas fa-tasks text-orange-500 mr-2"></i>Assigned to Me</h2><div id="myTasksList" class="space-y-3 max-h-[70vh] overflow-y-auto"></div></div>`;
            const q = query(collection(db, "tasks"), where("assignedTo", "==", currentUser.uid), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const tasks = []; snap.forEach(d => tasks.push({ id: d.id, ...d.data() }));
            const container = document.getElementById('myTasksList');
            if (!tasks.length) { container.innerHTML = '<div class="text-gray-400 text-center py-12">No tasks assigned to you.</div>'; return; }
            container.innerHTML = tasks.map(t => `
                <div class="task-card p-4 rounded-xl ${t.status ? 'border-green-500/30 bg-green-950/20' : 'border-orange-500/30 bg-orange-950/10'}">
                    <div class="flex flex-wrap justify-between gap-3 items-center">
                        <div class="flex-1">
                            <p class="font-bold text-white">${escapeHtml(t.description)}</p>
                            <div class="text-xs text-gray-400 mt-1">Due: ${t.date} | Notes: ${t.notes || '-'}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="px-3 py-1 rounded-full text-xs font-medium ${t.status ? 'bg-green-600' : 'bg-orange-600'}">${t.status ? 'RESOLVED' : 'PENDING'}</span>
                            ${!t.status ? `<button data-id="${t.id}" class="resolveMyBtn bg-green-600/80 hover:bg-green-500 px-3 py-1.5 rounded-lg text-xs"><i class="fas fa-check"></i> Mark Resolved</button>` : ''}
                        </div>
                    </div>
                </div>`).join('');
            document.querySelectorAll('.resolveMyBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await updateDoc(doc(db, "tasks", btn.dataset.id), { status: true });
                    showToast("Task resolved! Good job.");
                    renderMyAssignedTasks();
                    renderUserAllTasksReadonly(); // update global view
                });
            });
        }

        // ADMIN: Team Management
        async function renderTeamManagement() {
            await refreshUsers();
            dynamicContent.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold text-white mb-4"><i class="fas fa-users text-orange-500 mr-2"></i>Team Roster</h2><button id="openUserModalBtn" class="bg-orange-600 hover:bg-orange-500 px-5 py-2 rounded-xl mb-6"><i class="fas fa-user-plus"></i> Add Member</button><div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="usersGrid"></div></div>`;
            const users = allUsersCache;
            const grid = document.getElementById('usersGrid');
            if (!users.length) grid.innerHTML = '<div class="text-gray-400">No users</div>';
            else grid.innerHTML = users.map(u => `<div class="bg-gray-800/50 rounded-xl p-4 border border-gray-700"><i class="fas fa-user-circle text-2xl text-orange-400"></i><h3 class="font-bold text-white mt-1">${u.name || u.email}</h3><p class="text-xs text-gray-400">${u.email}</p><span class="inline-block mt-2 text-xs px-2 py-1 rounded-full ${u.role === 'admin' ? 'bg-orange-500/30 text-orange-300' : 'bg-green-500/30 text-green-300'}">${u.role}</span></div>`).join('');
            document.getElementById('openUserModalBtn').addEventListener('click', () => showCreateUserModal());
        }
        function showCreateUserModal() {
            const modalHtml = `<div id="userModal" class="fixed inset-0 flex items-center justify-center z-50 modal-backdrop"><div class="bg-gray-900 rounded-2xl p-6 w-96 border border-gray-700"><h3 class="text-xl font-bold text-white mb-4">Create User</h3><input id="userName" placeholder="Full Name" class="w-full p-2 mb-3 bg-gray-800 text-white rounded"><input id="userEmail" placeholder="Email" class="w-full p-2 mb-3 bg-gray-800 text-white rounded"><input id="userPass" type="password" placeholder="Password" class="w-full p-2 mb-3 bg-gray-800 text-white rounded"><select id="userRole" class="w-full p-2 mb-4 bg-gray-800 text-white rounded"><option value="user">Team Member</option><option value="admin">Administrator</option></select><div class="flex justify-end gap-3"><button id="closeModal" class="px-4 py-2 bg-gray-700 rounded">Cancel</button><button id="confirmCreate" class="px-4 py-2 bg-orange-600 rounded">Create</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('confirmCreate').onclick = async () => {
                const name = document.getElementById('userName').value.trim();
                const email = document.getElementById('userEmail').value.trim();
                const pwd = document.getElementById('userPass').value;
                const role = document.getElementById('userRole').value;
                if (!name || !email || !pwd) { alert("All fields required"); return; }
                try {
                    const cred = await createUserWithEmailAndPassword(auth, email, pwd);
                    await setDoc(doc(db, "users", cred.user.uid), { email, name, role, createdAt: Timestamp.now() });
                    showToast(`${name} added as ${role}`);
                    document.getElementById('userModal')?.remove();
                    renderTeamManagement();
                } catch (err) { alert(err.message); }
            };
            document.getElementById('closeModal').onclick = () => document.getElementById('userModal')?.remove();
        }

        // ADMIN Analytics
        async function renderAdminAnalytics() {
            await refreshUsers();
            const users = allUsersCache.filter(u => u.role === 'user');
            dynamicContent.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold text-white mb-4">Performance Analytics</h2><select id="analyticsSelect" class="p-2 rounded w-64">${users.map(u => `<option value="${u.uid}">${u.name || u.email}</option>`).join('')}</select><canvas id="analyticsChart" class="mt-6 h-64"></canvas><div id="analyticsStats" class="grid grid-cols-3 gap-4 mt-6"></div></div>`;
            const select = document.getElementById('analyticsSelect');
            if (!users.length) { dynamicContent.innerHTML += '<div class="text-gray-400">No team members</div>'; return; }
            async function update(uid) {
                const tasksSnap = await getDocs(query(collection(db, "tasks"), where("assignedTo", "==", uid)));
                const tasks = []; tasksSnap.forEach(d => tasks.push(d.data()));
                const resolved = tasks.filter(t => t.status).length, pending = tasks.length - resolved;
                const rate = tasks.length ? ((resolved/tasks.length)*100).toFixed(1) : 0;
                const ctx = document.getElementById('analyticsChart').getContext('2d');
                if(window.anaChart) window.anaChart.destroy();
                window.anaChart = new Chart(ctx, { type: 'bar', data: { labels: ['Resolved', 'Pending'], datasets: [{ label: 'Tasks', data: [resolved, pending], backgroundColor: ['#22c55e', '#f97316'] }] } });
                document.getElementById('analyticsStats').innerHTML = `<div class="bg-gray-800 p-3 rounded text-center"><p class="text-2xl font-bold text-green-400">${resolved}</p><p>Resolved</p></div><div class="bg-gray-800 p-3 rounded text-center"><p class="text-2xl font-bold text-orange-400">${pending}</p><p>Pending</p></div><div class="bg-gray-800 p-3 rounded text-center"><p class="text-2xl font-bold text-blue-400">${rate}%</p><p>Completion</p></div>`;
            }
            select.onchange = () => update(select.value);
            update(select.value);
        }

        // Monthly Report PDF
        async function renderMonthlyReport() {
            await refreshUsers();
            dynamicContent.innerHTML = `<div class="glass-card p-6 max-w-2xl mx-auto"><h2 class="text-2xl font-bold text-white mb-4"><i class="fas fa-file-pdf text-red-500"></i> Monthly Report</h2><div class="mb-4"><label>Select Month</label><input type="month" id="reportMonth" class="w-full p-2 rounded"></div><div class="mb-6"><label>Team Member</label><select id="reportUser" class="w-full p-2 rounded"><option value="all">All Members</option>${allUsersCache.filter(u=>u.role==='user').map(u=>`<option value="${u.uid}">${u.name||u.email}</option>`)}</select></div><button id="generatePdfBtn" class="bg-red-600 w-full py-2 rounded-xl font-semibold">Generate PDF</button><div id="pdfMsg" class="mt-3 text-sm"></div></div>`;
            document.getElementById('generatePdfBtn').onclick = async () => {
                const monthYear = document.getElementById('reportMonth').value;
                if (!monthYear) { alert("Select month"); return; }
                const [year, month] = monthYear.split('-');
                const start = `${year}-${month}-01`, end = `${year}-${month}-${new Date(year, month, 0).getDate()}`;
                const selected = document.getElementById('reportUser').value;
                let q = collection(db, "tasks");
                if (selected !== "all") q = query(q, where("assignedTo", "==", selected));
                const snap = await getDocs(q);
                const tasks = []; snap.forEach(d => { const t = d.data(); if (t.date >= start && t.date <= end) tasks.push(t); });
                if (!tasks.length) { document.getElementById('pdfMsg').innerHTML = '<span class="text-red-400">No tasks in period</span>'; return; }
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('landscape');
                pdf.setFillColor(249, 115, 22); pdf.rect(0, 0, 297, 20, 'F');
                pdf.setTextColor(255,255,255); pdf.setFontSize(18); pdf.text("M&P Express - Monthly Performance Report", 14, 15);
                pdf.setTextColor(0,0,0); pdf.setFontSize(10); pdf.text(`Period: ${monthYear} | Generated: ${new Date().toLocaleString()}`, 14, 30);
                let y = 40;
                const grouped = {};
                tasks.forEach(t => { if (!grouped[t.assignedTo]) grouped[t.assignedTo] = []; grouped[t.assignedTo].push(t); });
                for (const [uid, userTasks] of Object.entries(grouped)) {
                    let userName = allUsersCache.find(u=>u.uid===uid)?.name || uid;
                    const resolved = userTasks.filter(t=>t.status).length;
                    const pending = userTasks.length - resolved;
                    pdf.setFontSize(12); pdf.text(`${userName} - Resolved: ${resolved} | Pending: ${pending} | Rate: ${((resolved/(resolved+pending||1))*100).toFixed(1)}%`, 14, y);
                    y += 8;
                    pdf.autoTable({ startY: y, head: [['Date','Task','Status','Notes']], body: userTasks.map(t=>[t.date, t.description, t.status?'Resolved':'Pending', t.notes||'']), margin: {left:14}, headStyles: { fillColor: [249,115,22] } });
                    y = pdf.lastAutoTable.finalY + 10;
                    if (y > 200) { pdf.addPage(); y = 20; }
                }
                pdf.save(`M&P_Report_${monthYear}.pdf`);
                document.getElementById('pdfMsg').innerHTML = '<span class="text-green-400">✓ PDF Downloaded</span>';
            };
        }

        // User stats
        async function renderUserStats() {
            dynamicContent.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold text-white mb-4">My Performance</h2><canvas id="userStatsChart" class="h-64"></canvas><div class="grid grid-cols-2 gap-4 mt-6" id="userStatsKpi"></div></div>`;
            const q = query(collection(db, "tasks"), where("assignedTo", "==", currentUser.uid));
            const snap = await getDocs(q);
            const tasks = []; snap.forEach(d => tasks.push(d.data()));
            const resolved = tasks.filter(t=>t.status).length, pending = tasks.length - resolved;
            const ctx = document.getElementById('userStatsChart').getContext('2d');
            if(window.userStatChart) window.userStatChart.destroy();
            window.userStatChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Resolved', 'Pending'], datasets: [{ data: [resolved, pending], backgroundColor: ['#22c55e', '#f97316'] }] } });
            document.getElementById('userStatsKpi').innerHTML = `<div class="bg-gray-800 p-4 rounded text-center"><p class="text-3xl font-bold text-green-400">${resolved}</p><p>Completed</p></div><div class="bg-gray-800 p-4 rounded text-center"><p class="text-3xl font-bold text-orange-400">${pending}</p><p>Pending</p></div>`;
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    </script>
</body>
</html>
