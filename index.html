<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>M&P Express Logistics | ComplaintHub Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- html2pdf for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff7ed; color: #2c2a29; padding: 24px 20px; }
    .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-card { background: white; max-width: 420px; width: 90%; border-radius: 40px; padding: 32px 28px; box-shadow: 0 25px 45px rgba(0,0,0,0.2); }
    .login-card h2 { margin-bottom: 24px; font-weight: 700; color: #ea580c; }
    .app-container { max-width: 1500px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: white; border-radius: 60px; padding: 12px 24px; margin-bottom: 28px; box-shadow: 0 4px 12px rgba(234,88,12,0.1); border: 1px solid #fed7aa; }
    .logo h2 { font-size: 1.6rem; background: linear-gradient(135deg, #ea580c, #c2410c); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .logo p { font-size: 0.7rem; color: #f97316; font-weight: 500; }
    .user-info { display: flex; align-items: center; gap: 20px; }
    .role-badge { background: #fff1e6; padding: 6px 14px; border-radius: 40px; font-size: 0.75rem; font-weight: 600; color: #c2410c; }
    .logout-btn { background: #ea580c; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: 28px; padding: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border-left: 5px solid #f97316; }
    .dashboard { display: flex; flex-wrap: wrap; gap: 28px; }
    .form-panel { flex: 1.2; min-width: 300px; }
    .list-panel { flex: 2.8; min-width: 380px; }
    .card { background: white; border-radius: 32px; padding: 24px; box-shadow: 0 12px 28px rgba(0,0,0,0.05); border: 1px solid #ffedd5; }
    .card-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; border-left: 5px solid #f97316; padding-left: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .form-group { margin-bottom: 18px; }
    label { font-weight: 500; font-size: 0.8rem; display: block; margin-bottom: 6px; color: #7c2d12; }
    input, select, textarea { width: 100%; padding: 10px 14px; border-radius: 20px; border: 1px solid #fed7aa; font-family: inherit; background: #fffaf5; }
    .btn-primary { background: #f97316; color: white; border: none; width: 100%; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary:hover { background: #ea580c; }
    .filters-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .complaint-item { background: #ffffff; border-radius: 28px; margin-bottom: 20px; padding: 18px; border: 1px solid #ffedd5; transition: 0.1s; }
    .complaint-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .complaint-title-text { font-weight: 700; font-size: 1rem; color: #7c2d12; margin: 4px 0; }
    .badge-priority { padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 700; }
    .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; }
    .priority-high { background: #fee2e2; color: #b91c1c; }
    .priority-medium { background: #fff3e3; color: #b45309; }
    .priority-low { background: #e0f2fe; color: #0c4a6e; }
    .status-pending { background: #ffedd5; color: #9a3412; }
    .status-done { background: #dcfce7; color: #166534; }
    .comment-section { margin-top: 16px; background: #fffaf5; border-radius: 24px; padding: 14px; }
    .comment-list { max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
    .comment { background: white; border-radius: 20px; padding: 10px 12px; margin-bottom: 8px; font-size: 0.8rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .comment-author { font-weight: 700; color: #c2410c; }
    .comment-text { margin-top: 4px; color: #2c2a29; word-break: break-word; }
    .add-comment { display: flex; gap: 8px; margin-top: 8px; }
    .add-comment input { flex: 1; border-radius: 30px; padding: 8px 14px; }
    .small-btn { background: #f97316; border: none; color: white; border-radius: 30px; padding: 0 16px; cursor: pointer; }
    .action-btns { display: flex; gap: 12px; justify-content: flex-end; margin-top: 12px; flex-wrap: wrap; }
    .btn-icon { padding: 6px 14px; border-radius: 30px; border: none; font-weight: 500; cursor: pointer; }
    .btn-done { background: #22c55e; color: white; }
    .btn-undo { background: #f97316; color: white; }
    .btn-delete { background: #ef4444; color: white; }
    .btn-report { background: #f97316; color: white; }
    .admin-panel { margin-top: 32px; background: #fff7ed; border-radius: 32px; padding: 20px; border: 1px solid #fed7aa; }
    .user-row { display: flex; justify-content: space-between; background: white; padding: 8px 12px; border-radius: 60px; margin-bottom: 8px; }
    .btn-secondary { background: #f97316; color: white; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 500; cursor: pointer; }
    i { margin-right: 6px; }
    .empty-state { text-align: center; padding: 40px; color: #9a3412; }
    footer { text-align: center; margin-top: 40px; padding: 20px; font-size: 0.75rem; color: #9a3412; border-top: 1px solid #fed7aa; }
  </style>
</head>
<body>
<div id="loginContainer"></div>
<div id="appContainer" style="display: none;"></div>

<script>
  // -------------------- DATA MODELS --------------------
  let users = [];
  let complaints = [];
  let comments = [];
  let currentUser = null;

  function saveAll() {
    localStorage.setItem('complaintHub_users', JSON.stringify(users));
    localStorage.setItem('complaintHub_complaints', JSON.stringify(complaints));
    localStorage.setItem('complaintHub_comments', JSON.stringify(comments));
  }

  function loadAll() {
    const storedUsers = localStorage.getItem('complaintHub_users');
    if (storedUsers) {
      users = JSON.parse(storedUsers);
    } else {
      users = [
        { id: 1, username: 'admin', password: 'admin123', role: 'admin' },
        { id: 2, username: 'it_ahmed', password: 'it123', role: 'it' },
        { id: 3, username: 'sse_ali', password: 'sse123', role: 'sse' },
        { id: 4, username: 'member_fatima', password: 'member123', role: 'member' }
      ];
    }
    const storedComplaints = localStorage.getItem('complaintHub_complaints');
    if (storedComplaints) {
      complaints = JSON.parse(storedComplaints);
      complaints = complaints.map(c => ({ ...c, title: c.title || `Issue #${c.id}` }));
    } else {
      complaints = [
        { id: 1001, member: 'Ahmed Raza', title: 'Laptop overheating', description: 'Laptop overheating frequently, shuts down randomly', date: new Date().toISOString().slice(0,10), priority: 'high', status: 'pending', createdBy: 'it_ahmed', createdAt: new Date().toISOString(), completedAt: null },
        { id: 1002, member: 'Sara Tariq', title: 'Slack notification failure', description: 'Slack notifications not working on mobile', date: new Date().toISOString().slice(0,10), priority: 'medium', status: 'done', createdBy: 'sse_ali', createdAt: new Date(Date.now()-86400000).toISOString(), completedAt: new Date().toISOString() }
      ];
    }
    const storedComments = localStorage.getItem('complaintHub_comments');
    if (storedComments) {
      comments = JSON.parse(storedComments);
    } else {
      comments = [
        { id: 5001, complaintId: 1001, text: 'Please try updating thermal drivers.', author: 'it_ahmed', timestamp: new Date().toISOString() }
      ];
    }
    saveAll();
  }

  function genId() { return Date.now() + Math.random() * 10000; }

  // -------------------- AUTH --------------------
  function renderLogin() {
    const container = document.getElementById('loginContainer');
    container.innerHTML = `
      <div class="login-overlay">
        <div class="login-card">
          <h2><i class="fas fa-box"></i> M&P Express Logistics</h2>
          <p style="margin-bottom:16px; color:#ea580c;">Complaint Management System</p>
          <div class="form-group"><label>Username</label><input type="text" id="loginUsername" placeholder="admin / it_ahmed / sse_ali"></div>
          <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
          <button id="doLoginBtn" class="btn-primary"><i class="fas fa-sign-in-alt"></i> Sign in</button>
          <p style="margin-top: 12px; font-size:0.7rem;">Demo: admin/admin123 | it_ahmed/it123 | sse_ali/sse123</p>
        </div>
      </div>
    `;
    document.getElementById('doLoginBtn').addEventListener('click', () => {
      const uname = document.getElementById('loginUsername').value.trim();
      const pwd = document.getElementById('loginPassword').value.trim();
      const user = users.find(u => u.username === uname && u.password === pwd);
      if (user) {
        currentUser = { ...user };
        localStorage.setItem('complaintHub_session', JSON.stringify({ id: user.id, username: user.username, role: user.role }));
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        renderMainApp();
      } else alert('Invalid credentials');
    });
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem('complaintHub_session');
    document.getElementById('loginContainer').style.display = 'flex';
    document.getElementById('appContainer').style.display = 'none';
    renderLogin();
  }

  function checkSession() {
    const session = localStorage.getItem('complaintHub_session');
    if (session) {
      try {
        const s = JSON.parse(session);
        const found = users.find(u => u.id === s.id && u.username === s.username);
        if (found) {
          currentUser = { ...found };
          document.getElementById('loginContainer').style.display = 'none';
          document.getElementById('appContainer').style.display = 'block';
          renderMainApp();
          return;
        }
      } catch(e) {}
    }
    document.getElementById('loginContainer').style.display = 'flex';
    document.getElementById('appContainer').style.display = 'none';
    renderLogin();
  }

  function canModifyStatus(role) { return role === 'admin' || role === 'it'; }
  function canDeleteComplaint(role) { return role === 'admin' || role === 'it'; }
  function canManageUsers(role) { return role === 'admin'; }

  // -------------------- PDF REPORT GENERATION --------------------
  async function generatePDF(elementId, filename) {
    const element = document.getElementById(elementId);
    if (!element) return;
    const opt = {
      margin: [0.5, 0.5, 0.5, 0.5],
      filename: filename,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, letterRendering: true },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    await html2pdf().set(opt).from(element).save();
  }

  function buildSingleComplaintHTML(comp) {
    const compComments = comments.filter(c => c.complaintId === comp.id).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    let commentsHtml = '<ul>';
    compComments.forEach(cmt => {
      commentsHtml += `<li><strong>${escapeHtml(cmt.author)}</strong> (${new Date(cmt.timestamp).toLocaleString()}): ${escapeHtml(cmt.text)}</li>`;
    });
    commentsHtml += '</ul>';
    return `
      <div style="font-family: 'Inter', sans-serif; padding: 20px;">
        <div style="text-align: center; border-bottom: 2px solid #f97316; margin-bottom: 20px;">
          <h1 style="color: #ea580c;">M&P Express Logistics</h1>
          <h3>Complaint Report (Single Issue)</h3>
        </div>
        <div style="margin-bottom: 20px;">
          <p><strong>Complaint ID:</strong> ${comp.id}</p>
          <p><strong>Title:</strong> ${escapeHtml(comp.title)}</p>
          <p><strong>Team Member:</strong> ${escapeHtml(comp.member)}</p>
          <p><strong>Priority:</strong> ${comp.priority.toUpperCase()}</p>
          <p><strong>Status:</strong> ${comp.status === 'done' ? 'RESOLVED' : 'PENDING'}</p>
          <p><strong>Incident Date:</strong> ${comp.date}</p>
          <p><strong>Description:</strong> ${escapeHtml(comp.description)}</p>
          <p><strong>Logged by:</strong> ${comp.createdBy} on ${new Date(comp.createdAt).toLocaleString()}</p>
          ${comp.completedAt ? `<p><strong>Resolved on:</strong> ${new Date(comp.completedAt).toLocaleString()}</p>` : ''}
        </div>
        <div style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px;">
          <h4>Comments / Ideas</h4>
          ${compComments.length === 0 ? '<p>No comments added.</p>' : commentsHtml}
        </div>
        <div style="text-align: center; margin-top: 30px; font-size: 10px; color: #777;">
          Generated by ${currentUser.username} on ${new Date().toLocaleString()} | Developed by Central IT
        </div>
      </div>
    `;
  }

  function buildFullReportHTML() {
    let complaintsHtml = '';
    complaints.forEach(comp => {
      const compComments = comments.filter(c => c.complaintId === comp.id);
      let commentsHtml = '<ul>';
      compComments.forEach(cmt => {
        commentsHtml += `<li><strong>${escapeHtml(cmt.author)}</strong> (${new Date(cmt.timestamp).toLocaleString()}): ${escapeHtml(cmt.text)}</li>`;
      });
      commentsHtml += '</ul>';
      complaintsHtml += `
        <div style="margin-bottom: 30px; border-bottom: 1px solid #fed7aa; padding-bottom: 15px;">
          <h3 style="color: #ea580c;">Complaint #${comp.id}</h3>
          <p><strong>Title:</strong> ${escapeHtml(comp.title)}</p>
          <p><strong>Member:</strong> ${escapeHtml(comp.member)} | <strong>Priority:</strong> ${comp.priority.toUpperCase()} | <strong>Status:</strong> ${comp.status === 'done' ? 'RESOLVED' : 'PENDING'}</p>
          <p><strong>Date:</strong> ${comp.date}</p>
          <p><strong>Description:</strong> ${escapeHtml(comp.description)}</p>
          <p><strong>Logged by:</strong> ${comp.createdBy} on ${new Date(comp.createdAt).toLocaleString()}</p>
          ${comp.completedAt ? `<p><strong>Resolved:</strong> ${new Date(comp.completedAt).toLocaleString()}</p>` : ''}
          <div><strong>Comments (${compComments.length}):</strong> ${compComments.length === 0 ? 'None' : commentsHtml}</div>
        </div>
      `;
    });
    return `
      <div style="font-family: 'Inter', sans-serif; padding: 20px;">
        <div style="text-align: center; border-bottom: 2px solid #f97316; margin-bottom: 20px;">
          <h1 style="color: #ea580c;">M&P Express Logistics</h1>
          <h3>Complete Complaints Report</h3>
          <p>Total: ${complaints.length} | Pending: ${complaints.filter(c => c.status === 'pending').length} | Resolved: ${complaints.filter(c => c.status === 'done').length}</p>
        </div>
        ${complaintsHtml}
        <div style="text-align: center; margin-top: 30px; font-size: 10px; color: #777;">
          Generated by ${currentUser.username} on ${new Date().toLocaleString()} | Developed by Central IT
        </div>
      </div>
    `;
  }

  async function exportSingleComplaintPDF(complaintId) {
    const comp = complaints.find(c => c.id === complaintId);
    if (!comp) return;
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = buildSingleComplaintHTML(comp);
    document.body.appendChild(tempDiv);
    await generatePDF(tempDiv, `complaint_${comp.id}_${comp.member.replace(/\s/g,'_')}.pdf`);
    document.body.removeChild(tempDiv);
  }

  async function exportFullReportPDF() {
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = buildFullReportHTML();
    document.body.appendChild(tempDiv);
    await generatePDF(tempDiv, `full_complaints_report_${new Date().toISOString().slice(0,19)}.pdf`);
    document.body.removeChild(tempDiv);
  }

  // -------------------- RENDER MAIN APP (ORANGE THEME + BRANDING) --------------------
  function renderMainApp() {
    const container = document.getElementById('appContainer');
    container.innerHTML = `
      <div class="app-container">
        <div class="top-bar">
          <div class="logo">
            <h2><i class="fas fa-truck-fast"></i> M&P Express Logistics</h2>
            <p>Complaint Management System | Enterprise</p>
          </div>
          <div class="user-info">
            <span class="role-badge"><i class="fas fa-user-tag"></i> ${currentUser.role.toUpperCase()} · ${currentUser.username}</span>
            <button id="logoutBtnMain" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
          </div>
        </div>
        <div class="stats-row" id="statsRow"></div>
        <div class="dashboard">
          <div class="form-panel">
            <div class="card">
              <div class="card-title"><i class="fas fa-plus-circle"></i> Log New Complaint</div>
              <form id="newComplaintForm">
                <div class="form-group"><label>Team member name</label><input type="text" id="compMember" required></div>
                <div class="form-group"><label>Complaint Title</label><input type="text" id="compTitle" placeholder="e.g., WiFi not working, Printer jam" required></div>
                <div class="form-group"><label>Priority</label><select id="compPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
                <div class="form-group"><label>Description</label><textarea id="compDesc" rows="2" placeholder="Detailed description of the issue..." required></textarea></div>
                <div class="form-group"><label>Date</label><input type="date" id="compDate" required></div>
                <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Submit Complaint</button>
              </form>
            </div>
            ${canManageUsers(currentUser.role) ? `<div class="admin-panel" id="adminPanel"><div class="card-title"><i class="fas fa-users-cog"></i> User Management (Admin)</div>
            <div class="form-group" style="display:flex; gap:6px; flex-wrap:wrap;"><input type="text" id="newUsername" placeholder="username" style="flex:1"><input type="password" id="newPassword" placeholder="pass"><select id="newRole"><option value="member">Member</option><option value="sse">SSE</option><option value="it">IT</option><option value="admin">Admin</option></select><button id="createUserBtn" class="small-btn">Create</button></div>
            <div id="userList"></div></div>` : ''}
          </div>
          <div class="list-panel">
            <div class="card">
              <div class="card-title">
                <span><i class="fas fa-filter"></i> Complaints & Comments</span>
                <div class="report-buttons">
                  <button id="fullReportPDFBtn" class="btn-secondary"><i class="fas fa-file-pdf"></i> Export PDF (Full)</button>
                </div>
              </div>
              <div class="filters-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search member / title / description" style="flex:2">
                <select id="filterPriority"><option value="all">All priority</option><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select>
                <select id="filterStatus"><option value="all">All status</option><option value="pending">Pending</option><option value="done">Resolved</option></select>
              </div>
              <div id="complaintsListContainer"></div>
            </div>
          </div>
        </div>
        <footer>
          <i class="fas fa-code"></i> Developed by Central IT | M&P Express Logistics © 2025
        </footer>
      </div>
    `;
    attachGlobalListeners();
    refreshStatsAndList();
    if (canManageUsers(currentUser.role)) renderUserList();
  }

  function refreshStatsAndList() {
    updateStats();
    renderComplaintsList();
  }

  function updateStats() {
    const total = complaints.length;
    const pending = complaints.filter(c => c.status === 'pending').length;
    const done = complaints.filter(c => c.status === 'done').length;
    const rate = total === 0 ? 0 : Math.round((done/total)*100);
    const statsHtml = `
      <div class="stat-card"><div><h4>Total</h4><span style="font-size:1.8rem; font-weight:800;">${total}</span></div><i class="fas fa-database fa-2x"></i></div>
      <div class="stat-card"><div><h4>Pending</h4><span style="font-size:1.8rem; font-weight:800;">${pending}</span></div><i class="fas fa-clock fa-2x"></i></div>
      <div class="stat-card"><div><h4>Resolved</h4><span style="font-size:1.8rem; font-weight:800;">${done}</span></div><i class="fas fa-check-circle fa-2x"></i></div>
      <div class="stat-card"><div><h4>Resolution Rate</h4><span style="font-size:1.8rem; font-weight:800;">${rate}%</span></div><i class="fas fa-chart-line fa-2x"></i></div>
    `;
    const statsRow = document.getElementById('statsRow');
    if (statsRow) statsRow.innerHTML = statsHtml;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderComplaintsList() {
    const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
    const priorityFilter = document.getElementById('filterPriority')?.value || 'all';
    const statusFilter = document.getElementById('filterStatus')?.value || 'all';
    let filtered = complaints.filter(c => {
      const matchSearch = c.member.toLowerCase().includes(search) || 
                          c.title.toLowerCase().includes(search) || 
                          c.description.toLowerCase().includes(search);
      const matchPriority = priorityFilter === 'all' || c.priority === priorityFilter;
      const matchStatus = statusFilter === 'all' || c.status === statusFilter;
      return matchSearch && matchPriority && matchStatus;
    }).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    const container = document.getElementById('complaintsListContainer');
    if (!container) return;
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> No complaints match filters</div>';
      return;
    }
    let html = '';
    filtered.forEach(comp => {
      const isDone = comp.status === 'done';
      const priorityClass = comp.priority === 'high' ? 'priority-high' : (comp.priority === 'medium' ? 'priority-medium' : 'priority-low');
      const priorityLabel = comp.priority === 'high' ? '🔴 HIGH' : (comp.priority === 'medium' ? '🟠 MEDIUM' : '🟢 LOW');
      const statusClass = isDone ? 'status-done' : 'status-pending';
      const statusText = isDone ? '✅ Resolved' : '⏳ Pending';
      const canEdit = canModifyStatus(currentUser.role);
      const canDelete = canDeleteComplaint(currentUser.role);
      const compComments = comments.filter(c => c.complaintId === comp.id).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
      let commentsHtml = '';
      compComments.forEach(cmt => {
        commentsHtml += `<div class="comment"><span class="comment-author"><i class="fas fa-user-circle"></i> ${escapeHtml(cmt.author)}</span><div class="comment-text">💬 ${escapeHtml(cmt.text)}</div><div style="font-size:0.6rem; color:#6c8b9b;">${new Date(cmt.timestamp).toLocaleString()}</div></div>`;
      });
      html += `
        <div class="complaint-item" data-id="${comp.id}">
          <div class="complaint-header">
            <div><strong><i class="fas fa-user"></i> ${escapeHtml(comp.member)}</strong> <span class="badge-priority ${priorityClass}">${priorityLabel}</span> <span class="status-badge ${statusClass}">${statusText}</span></div>
            <div style="font-size:0.7rem;">📅 ${escapeHtml(comp.date)}</div>
          </div>
          <div class="complaint-title-text"><i class="fas fa-heading"></i> ${escapeHtml(comp.title)}</div>
          <div><i class="fas fa-align-left"></i> ${escapeHtml(comp.description)}</div>
          <div style="font-size:0.7rem; color:#5a6e7c; margin:6px 0;">🕒 logged by ${escapeHtml(comp.createdBy)} on ${new Date(comp.createdAt).toLocaleDateString()}</div>
          <div class="comment-section">
            <div class="comment-list" id="comments-${comp.id}">${commentsHtml || '<div style="font-size:0.7rem; color:gray;">No comments yet. Add a suggestion or idea.</div>'}</div>
            <div class="add-comment">
              <input type="text" id="commentInput-${comp.id}" placeholder="Write a comment or solution idea...">
              <button class="small-btn addCommentBtn" data-id="${comp.id}"><i class="fas fa-comment"></i> Post</button>
            </div>
          </div>
          <div class="action-btns">
            <button class="btn-icon btn-report" data-action="report" data-id="${comp.id}"><i class="fas fa-download"></i> PDF Report</button>
            ${canEdit ? (isDone ? `<button class="btn-icon btn-undo" data-action="toggle" data-id="${comp.id}"><i class="fas fa-undo"></i> Reopen</button>` : `<button class="btn-icon btn-done" data-action="toggle" data-id="${comp.id}"><i class="fas fa-check"></i> Mark Resolved</button>`) : ''}
            ${canDelete ? `<button class="btn-icon btn-delete" data-action="delete" data-id="${comp.id}"><i class="fas fa-trash"></i> Delete</button>` : ''}
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    // attach dynamic listeners
    document.querySelectorAll('.addCommentBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const complaintId = parseFloat(btn.getAttribute('data-id'));
        const input = document.getElementById(`commentInput-${complaintId}`);
        const text = input.value.trim();
        if (!text) return alert("Please write a comment");
        addComment(complaintId, text);
        input.value = '';
      });
    });
    document.querySelectorAll('[data-action="toggle"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseFloat(btn.getAttribute('data-id'));
        toggleComplaintStatus(id);
      });
    });
    document.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseFloat(btn.getAttribute('data-id'));
        deleteComplaintById(id);
      });
    });
    document.querySelectorAll('[data-action="report"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseFloat(btn.getAttribute('data-id'));
        exportSingleComplaintPDF(id);
      });
    });
  }

  function addComment(complaintId, text) {
    comments.push({
      id: genId(),
      complaintId: complaintId,
      text: text,
      author: currentUser.username,
      timestamp: new Date().toISOString()
    });
    saveAll();
    refreshStatsAndList();
  }

  function toggleComplaintStatus(id) {
    const idx = complaints.findIndex(c => c.id === id);
    if (idx !== -1) {
      if (complaints[idx].status === 'pending') {
        complaints[idx].status = 'done';
        complaints[idx].completedAt = new Date().toISOString();
      } else {
        complaints[idx].status = 'pending';
        complaints[idx].completedAt = null;
      }
      saveAll();
      refreshStatsAndList();
    }
  }

  function deleteComplaintById(id) {
    if (confirm("Delete permanently? Comments will also be removed.")) {
      complaints = complaints.filter(c => c.id !== id);
      comments = comments.filter(c => c.complaintId !== id);
      saveAll();
      refreshStatsAndList();
      if (canManageUsers(currentUser.role)) renderUserList();
    }
  }

  function addNewComplaint(member, title, desc, date, priority) {
    if (!member || !title || !desc) return false;
    complaints.unshift({
      id: genId(),
      member: member.trim(),
      title: title.trim(),
      description: desc.trim(),
      date: date,
      priority: priority,
      status: 'pending',
      createdBy: currentUser.username,
      createdAt: new Date().toISOString(),
      completedAt: null
    });
    saveAll();
    refreshStatsAndList();
    return true;
  }

  function renderUserList() {
    const userDiv = document.getElementById('userList');
    if (!userDiv) return;
    let html = '<h4 style="margin:12px 0 8px;">Existing users</h4>';
    users.forEach(u => {
      html += `<div class="user-row"><span><i class="fas fa-user"></i> ${escapeHtml(u.username)} (${escapeHtml(u.role)})</span> ${u.username !== 'admin' ? `<button class="small-btn deleteUserBtn" data-id="${u.id}" style="background:#e74c3c;">Delete</button>` : '<span style="font-size:0.7rem;">⭐ protected</span>'}</div>`;
    });
    userDiv.innerHTML = html;
    document.querySelectorAll('.deleteUserBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const uid = parseInt(btn.getAttribute('data-id'));
        if (confirm('Delete user?')) {
          users = users.filter(u => u.id !== uid);
          if (currentUser && currentUser.id === uid) logout();
          else { saveAll(); renderUserList(); refreshStatsAndList(); }
        }
      });
    });
  }

  function createUser(username, password, role) {
    if (users.find(u => u.username === username)) { alert("Username exists"); return false; }
    const newId = users.length > 0 ? Math.max(...users.map(u=>u.id)) + 1 : 100;
    users.push({ id: newId, username, password, role });
    saveAll();
    renderUserList();
    return true;
  }

  function attachGlobalListeners() {
    const form = document.getElementById('newComplaintForm');
    if (form) {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const member = document.getElementById('compMember').value;
        const title = document.getElementById('compTitle').value;
        const desc = document.getElementById('compDesc').value;
        const date = document.getElementById('compDate').value;
        const priority = document.getElementById('compPriority').value;
        if (!date) { alert("Select incident date"); return; }
        if (addNewComplaint(member, title, desc, date, priority)) {
          form.reset();
          document.getElementById('compDate').value = new Date().toISOString().slice(0,10);
        }
      });
      if(document.getElementById('compDate')) document.getElementById('compDate').value = new Date().toISOString().slice(0,10);
    }
    document.getElementById('searchInput')?.addEventListener('input', () => refreshStatsAndList());
    document.getElementById('filterPriority')?.addEventListener('change', () => refreshStatsAndList());
    document.getElementById('filterStatus')?.addEventListener('change', () => refreshStatsAndList());
    document.getElementById('fullReportPDFBtn')?.addEventListener('click', () => exportFullReportPDF());
    const createBtn = document.getElementById('createUserBtn');
    if (createBtn) {
      createBtn.addEventListener('click', () => {
        const uname = document.getElementById('newUsername').value.trim();
        const pwd = document.getElementById('newPassword').value.trim();
        const role = document.getElementById('newRole').value;
        if (!uname || !pwd) { alert("Username & password required"); return; }
        createUser(uname, pwd, role);
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
      });
    }
    const logoutBtn = document.getElementById('logoutBtnMain');
    if (logoutBtn) logoutBtn.addEventListener('click', logout);
  }

  loadAll();
  checkSession();
</script>
</body>
</html>
