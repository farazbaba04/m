<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&P Express Logistics | IT Complaint Portal (Standalone)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #fef9f1; font-family: 'Inter', sans-serif; }
        .luxury-card { background: rgba(255,255,255,0.96); border-radius: 2rem; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.1); transition: all 0.2s; }
        .luxury-card:hover { transform: translateY(-3px); }
        .gradient-orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .glass-nav { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(249,115,22,0.2); }
        .btn-luxury { background: linear-gradient(105deg, #f97316, #ea580c); box-shadow: 0 8px 18px rgba(249,115,22,0.25); transition: all 0.2s; }
        .btn-luxury:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div id="app">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-amber-50 to-orange-100 px-4">
        <div class="max-w-md w-full bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-8 border border-orange-100">
            <div class="text-center">
                <div class="mx-auto w-24 h-24 gradient-orange rounded-3xl flex items-center justify-center shadow-xl">
                    <i class="fas fa-truck-fast text-white text-4xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold mt-5 text-gray-800">M&P Express</h2>
                <p class="text-orange-600 font-medium text-sm">IT Complaint Portal — Standalone</p>
            </div>
            <form id="loginForm" class="mt-8">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Email</label>
                    <input type="email" id="loginEmail" required class="w-full border border-gray-200 rounded-2xl px-5 py-3 focus:ring-2 focus:ring-orange-400 outline-none bg-gray-50">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <input type="password" id="loginPassword" required class="w-full border border-gray-200 rounded-2xl px-5 py-3 focus:ring-2 focus:ring-orange-400 outline-none bg-gray-50">
                </div>
                <button type="submit" class="w-full btn-luxury text-white font-bold py-3 rounded-2xl transition flex items-center justify-center gap-2"><i class="fas fa-sign-in-alt"></i> Access Portal</button>
            </form>
            <p class="text-center text-xs text-gray-500 mt-4">Default Admin: <span class="font-mono">admin@mpexpress.com</span> / <span class="font-mono">543210</span></p>
            <p class="text-center text-xs text-gray-400 mt-6">Developed by Faraz Sheikh</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardScreen" class="hidden">
        <nav class="glass-nav sticky top-0 z-30 shadow-sm">
            <div class="max-w-7xl mx-auto px-5 sm:px-8 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-truck-fast text-orange-500 text-2xl"></i>
                    <h1 class="text-xl font-black text-gray-800">M&P Logistics IT</h1>
                    <span id="roleBadge" class="text-xs bg-orange-100 text-orange-800 px-3 py-1 rounded-full"></span>
                </div>
                <div class="flex items-center gap-5">
                    <div class="text-right hidden sm:block">
                        <p id="userFullname" class="text-sm font-bold text-gray-700"></p>
                        <p id="userRoleText" class="text-xs text-gray-500"></p>
                    </div>
                    <button id="logoutBtn" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-medium hover:bg-red-100 transition flex gap-2"><i class="fas fa-sign-out-alt"></i> Exit</button>
                </div>
            </div>
        </nav>
        <main class="max-w-7xl mx-auto px-5 sm:px-8 py-10"><div id="dynamicView"></div></main>
        <footer class="text-center text-gray-400 text-xs py-6 border-t border-orange-100">© 2026 M&P Express Logistics – All data stored locally | Developed by Faraz Sheikh</footer>
    </div>
</div>

<script>
    // ---------- LOCAL STORAGE BACKEND (NO FIREBASE) ----------
    // Initialize default data if empty
    let users = [];
    let complaints = [];
    let currentUser = null;
    let unsubscribeTimer = null; // for HOD realtime simulation

    function loadData() {
        const storedUsers = localStorage.getItem("mp_users");
        if (storedUsers) {
            users = JSON.parse(storedUsers);
        } else {
            users = [
                { uid: "admin1", email: "admin@mpexpress.com", password: "543210", fullName: "Admin", role: "admin", designation: "Admin" }
            ];
            saveUsers();
        }
        const storedComplaints = localStorage.getItem("mp_complaints");
        if (storedComplaints) {
            complaints = JSON.parse(storedComplaints);
        } else {
            complaints = [];
            saveComplaints();
        }
    }

    function saveUsers() { localStorage.setItem("mp_users", JSON.stringify(users)); }
    function saveComplaints() { localStorage.setItem("mp_complaints", JSON.stringify(complaints)); }

    function getUserById(uid) { return users.find(u => u.uid === uid) || { fullName: "Unknown", designation: "" }; }
    function getUserByEmail(email) { return users.find(u => u.email === email); }

    function login(email, password) {
        const user = users.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = { ...user };
            localStorage.setItem("mp_current_user", JSON.stringify({ uid: user.uid, email: user.email, fullName: user.fullName, role: user.role, designation: user.designation }));
            return true;
        }
        return false;
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem("mp_current_user");
    }

    function restoreSession() {
        const saved = localStorage.getItem("mp_current_user");
        if (saved) {
            const u = JSON.parse(saved);
            const fullUser = users.find(user => user.uid === u.uid);
            if (fullUser) {
                currentUser = fullUser;
                return true;
            }
        }
        return false;
    }

    // Helper functions
    function statusBadge(status) {
        const colors = { open: "bg-amber-100 text-amber-800", "in-progress": "bg-blue-100 text-blue-800", resolved: "bg-emerald-100 text-emerald-800", closed: "bg-gray-100 text-gray-800" };
        return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${colors[status]}">${status}</span>`;
    }
    function priorityBadge(priority) {
        const colors = { low: "bg-gray-200", medium: "bg-orange-100 text-orange-700", high: "bg-red-100 text-red-700", critical: "bg-rose-200 text-rose-800" };
        return `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${colors[priority]}">${priority}</span>`;
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // ---------- UI RENDERING ----------
    function renderCurrentView() {
        const container = document.getElementById("dynamicView");
        if (currentUser.role === "admin") renderAdminDashboard(container);
        else if (currentUser.role === "hod") renderHODDashboard(container);
        else renderSSEDashboard(container);
    }

    // ---------- ADMIN DASHBOARD ----------
    function renderAdminDashboard(container) {
        let selectedYear = new Date().getFullYear();
        let selectedMonth = new Date().getMonth() + 1;
        let sseUsers = users.filter(u => u.role === "sse" || u.role === "hod");

        function getFilteredComplaints() {
            return complaints.filter(c => {
                const d = new Date(c.createdDate);
                return d.getFullYear() === selectedYear && (d.getMonth()+1) === selectedMonth;
            });
        }

        function generateReportHTML() {
            const filtered = getFilteredComplaints();
            const total = filtered.length;
            const statusCount = { open:0, "in-progress":0, resolved:0, closed:0 };
            const priorityCount = { low:0, medium:0, high:0, critical:0 };
            filtered.forEach(c => { statusCount[c.status]++; priorityCount[c.priority]++; });
            return `<div class="luxury-card p-6 mb-8">
                <div class="flex flex-wrap justify-between items-center border-b pb-4 mb-4"><h3 class="text-2xl font-bold"><i class="fas fa-chart-line text-orange-500 mr-2"></i>📅 Monthly Report</h3>
                <div class="flex gap-3"><select id="reportMonth" class="border rounded-xl px-3 py-2">${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${selectedMonth===i+1?'selected':''}>${new Date(0,i).toLocaleString('default',{month:'long'})}</option>`).join('')}</select>
                <select id="reportYear" class="border rounded-xl px-3 py-2">${[2024,2025,2026].map(y=>`<option value="${y}" ${selectedYear===y?'selected':''}>${y}</option>`).join('')}</select>
                <button id="refreshReport" class="bg-orange-100 hover:bg-orange-200 text-orange-700 px-4 py-2 rounded-xl"><i class="fas fa-sync-alt"></i></button>
                <button id="exportCSV" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-4 py-2 rounded-xl"><i class="fas fa-download"></i> CSV</button></div></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"><div class="bg-orange-50 p-4 rounded-2xl"><p class="text-xs">Total</p><p class="text-2xl font-black text-orange-700">${total}</p></div>
                <div class="bg-amber-50 p-4 rounded-2xl"><p class="text-xs">Open/Progress</p><p class="text-2xl font-black">${(statusCount.open||0)+(statusCount["in-progress"]||0)}</p></div>
                <div class="bg-green-50 p-4 rounded-2xl"><p class="text-xs">Resolved/Closed</p><p class="text-2xl font-black">${(statusCount.resolved||0)+(statusCount.closed||0)}</p></div>
                <div class="bg-rose-50 p-4 rounded-2xl"><p class="text-xs">Critical</p><p class="text-2xl font-black">${priorityCount.critical||0}</p></div></div>
                <div class="overflow-auto"><table class="min-w-full text-sm"><thead class="bg-orange-50"><tr><th>ID</th><th>Title</th><th>Assignee</th><th>Priority</th><th>Status</th><th>Date</th></tr></thead><tbody>
                ${filtered.map(c => `<tr class="border-b"><td class="py-2 font-mono text-xs">${c.id.slice(0,6)}</td><td>${escapeHtml(c.title)}</td><td>${getUserById(c.assignedTo).fullName} (${getUserById(c.assignedTo).designation})</td><td>${priorityBadge(c.priority)}</td><td>${statusBadge(c.status)}</td><td>${new Date(c.createdDate).toLocaleDateString()}</td></tr>`).join('')}
                ${filtered.length===0?'<tr><td colspan="6" class="text-center py-4 text-gray-400">No data</td></tr>':''}</tbody></table></div></div>`;
        }

        function renderComplaintTable() {
            if(complaints.length === 0) return '<div class="luxury-card p-10 text-center text-gray-400">No complaints</div>';
            return `<div class="luxury-card overflow-hidden"><table class="min-w-full"><thead class="bg-orange-50"><tr><th class="p-4 text-left">ID</th><th>Title</th><th>Assigned</th><th>Priority</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead><tbody>
            ${complaints.map(c => `<tr class="border-b hover:bg-orange-50"><td class="p-4 font-mono text-xs">${c.id.slice(0,6)}</td><td class="font-medium">${escapeHtml(c.title)}<div class="text-xs text-gray-400">${escapeHtml(c.description.substring(0,45))}</div></td><td>${getUserById(c.assignedTo).fullName} (${getUserById(c.assignedTo).designation})</td><td>${priorityBadge(c.priority)}</td><td>${statusBadge(c.status)}</td><td class="text-xs">${new Date(c.createdDate).toLocaleDateString()}</td>
            <td class="flex gap-2"><button data-id="${c.id}" class="editBtn text-orange-600"><i class="fas fa-edit"></i></button><button data-id="${c.id}" class="deleteBtn text-red-500"><i class="fas fa-trash-alt"></i></button></td></tr>`).join('')}</tbody></table></div>`;
        }

        function renderUserManagement() {
            return `<div class="luxury-card p-6 mb-8"><h3 class="text-xl font-bold mb-4"><i class="fas fa-users text-orange-500"></i> Manage Users (SSE / HOD)</h3>
            <form id="createUserForm" class="grid md:grid-cols-5 gap-3 mb-6"><input type="text" id="newFullName" placeholder="Full Name" class="border rounded-xl p-2"><input type="email" id="newEmail" placeholder="Email" class="border rounded-xl p-2"><input type="text" id="newPassword" placeholder="Password" class="border rounded-xl p-2">
            <select id="newRole" class="border rounded-xl p-2"><option value="sse">SSE</option><option value="hod">HOD</option></select><select id="newDesignation" class="border rounded-xl p-2"><option value="SSE">SSE</option><option value="Sr. SSE">Sr. SSE</option><option value="HOD">HOD</option></select>
            <button type="submit" class="bg-orange-500 text-white rounded-xl px-4 py-2"><i class="fas fa-user-plus"></i> Create</button></form>
            <div class="overflow-auto"><table class="min-w-full"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Designation</th><th></th></tr></thead><tbody id="userListBody">
            ${sseUsers.map(u => `<tr><td>${escapeHtml(u.fullName)}</td><td>${escapeHtml(u.email)}</td><td>${u.role}</td><td>${u.designation}</td><td><button data-uid="${u.uid}" class="deleteUserBtn text-red-500"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
            ${sseUsers.length===0?'<tr><td colspan="5" class="text-center py-4">No users</td></tr>':''}</tbody></table></div></div>`;
        }

        function refreshUI() {
            sseUsers = users.filter(u => u.role === "sse" || u.role === "hod");
            container.innerHTML = `<div class="space-y-8"><div class="flex justify-between"><h2 class="text-3xl font-black">Complaints</h2><button id="newComplaintBtn" class="btn-luxury text-white px-6 py-2 rounded-2xl"><i class="fas fa-plus"></i> New</button></div>
            <div id="reportArea"></div><div id="complaintTableArea"></div><div id="userManagementArea"></div></div>`;
            document.getElementById("reportArea").innerHTML = generateReportHTML();
            document.getElementById("complaintTableArea").innerHTML = renderComplaintTable();
            document.getElementById("userManagementArea").innerHTML = renderUserManagement();

            document.getElementById("refreshReport")?.addEventListener("click", () => { selectedMonth = parseInt(document.getElementById("reportMonth").value); selectedYear = parseInt(document.getElementById("reportYear").value); document.getElementById("reportArea").innerHTML = generateReportHTML(); });
            document.getElementById("exportCSV")?.addEventListener("click", () => exportCSV(selectedYear, selectedMonth));
            document.getElementById("newComplaintBtn")?.addEventListener("click", () => openComplaintModal());
            document.querySelectorAll(".editBtn").forEach(btn => btn.addEventListener("click", () => { const id = btn.dataset.id; const comp = complaints.find(c=>c.id===id); if(comp) openComplaintModal(comp); }));
            document.querySelectorAll(".deleteBtn").forEach(btn => btn.addEventListener("click", () => { if(confirm("Delete?")) { complaints = complaints.filter(c => c.id !== btn.dataset.id); saveComplaints(); refreshUI(); } }));

            document.getElementById("createUserForm")?.addEventListener("submit", (e) => {
                e.preventDefault();
                const fullName = document.getElementById("newFullName").value.trim(), email = document.getElementById("newEmail").value.trim(), password = document.getElementById("newPassword").value.trim(), role = document.getElementById("newRole").value, designation = document.getElementById("newDesignation").value;
                if(!fullName||!email||!password) return alert("Fill all fields");
                if(users.find(u => u.email === email)) return alert("Email already exists");
                const newUid = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
                users.push({ uid: newUid, email, password, fullName, role, designation });
                saveUsers();
                refreshUI();
                document.getElementById("createUserForm").reset();
            });

            document.querySelectorAll(".deleteUserBtn").forEach(btn => btn.addEventListener("click", () => {
                const uid = btn.dataset.uid;
                if(confirm("Delete user? Their complaints will be reassigned to admin.")) {
                    const admin = users.find(u => u.role === "admin");
                    if(admin) {
                        complaints.forEach(c => { if(c.assignedTo === uid) c.assignedTo = admin.uid; });
                        saveComplaints();
                    }
                    users = users.filter(u => u.uid !== uid);
                    saveUsers();
                    refreshUI();
                }
            }));
        }

        function exportCSV(year, month) {
            const filtered = complaints.filter(c => { const d = new Date(c.createdDate); return d.getFullYear() === year && (d.getMonth()+1) === month; });
            if(!filtered.length) return alert("No data");
            let csv = [["ID","Title","Description","Assignee","Designation","Priority","Status","Created","Due Date"]];
            filtered.forEach(c => { const u = getUserById(c.assignedTo); csv.push([c.id, c.title, c.description, u.fullName, u.designation, c.priority, c.status, new Date(c.createdDate).toLocaleString(), c.dueDate||'N/A']); });
            const blob = new Blob([csv.map(row=>row.join(",")).join("\n")], {type:"text/csv"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `report_${year}_${month}.csv`; a.click();
        }
        refreshUI();
    }

    // ---------- HOD DASHBOARD (real-time simulation with setInterval) ----------
    function renderHODDashboard(container) {
        let chartTrend = null, chartPriority = null;

        function updateDashboard() {
            const total = complaints.length;
            const openCount = complaints.filter(c => c.status === "open" || c.status === "in-progress").length;
            const resolved = complaints.filter(c => c.status === "resolved" || c.status === "closed").length;
            const highCritical = complaints.filter(c => c.priority === "high" || c.priority === "critical").length;
            document.getElementById("hodStats").innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-8">
                    <div class="luxury-card p-5"><p class="text-gray-500 text-sm">Total Complaints</p><p class="text-3xl font-black text-orange-600">${total}</p></div>
                    <div class="luxury-card p-5"><p class="text-gray-500 text-sm">Open / In Progress</p><p class="text-3xl font-black text-amber-600">${openCount}</p></div>
                    <div class="luxury-card p-5"><p class="text-gray-500 text-sm">Resolved / Closed</p><p class="text-3xl font-black text-emerald-600">${resolved}</p></div>
                    <div class="luxury-card p-5"><p class="text-gray-500 text-sm">High + Critical</p><p class="text-3xl font-black text-rose-600">${highCritical}</p></div>
                </div>
            `;
            const last7 = [...Array(7)].map((_,i)=>{const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10);}).reverse();
            const counts = last7.map(date=> complaints.filter(c=>c.createdDate?.slice(0,10)===date).length);
            if(chartTrend) chartTrend.destroy();
            const ctxTrend = document.getElementById("trendChart").getContext("2d");
            chartTrend = new Chart(ctxTrend, { type:"line", data:{ labels:last7.map(d=>d.slice(5)), datasets:[{ label:"Complaints per day", data:counts, borderColor:"#f97316", backgroundColor:"rgba(249,115,22,0.1)", tension:0.3, fill:true }] }, options:{ responsive:true, maintainAspectRatio:false } });
            const priorityLabels = ["low","medium","high","critical"];
            const priorityData = priorityLabels.map(p=> complaints.filter(c=>c.priority===p).length);
            if(chartPriority) chartPriority.destroy();
            const ctxPie = document.getElementById("priorityChart").getContext("2d");
            chartPriority = new Chart(ctxPie, { type:"doughnut", data:{ labels:priorityLabels, datasets:[{ data:priorityData, backgroundColor:["#9ca3af","#f97316","#ef4444","#be123c"] }] }, options:{ responsive:true } });
            const recent = [...complaints].sort((a,b)=>new Date(b.createdDate)-new Date(a.createdDate)).slice(0,8);
            document.getElementById("recentTable").innerHTML = `<div class="overflow-auto"><table class="min-w-full"><thead class="bg-orange-50"><tr><th>ID</th><th>Title</th><th>Assignee</th><th>Priority</th><th>Status</th><th>Date</th></tr></thead><tbody>
            ${recent.map(c=>`<tr class="border-b"><td class="p-2 text-xs">${c.id.slice(0,6)}</td><td>${escapeHtml(c.title)}</td><td>${getUserById(c.assignedTo).fullName}</td><td>${priorityBadge(c.priority)}</td><td>${statusBadge(c.status)}</td><td class="text-xs">${new Date(c.createdDate).toLocaleDateString()}</td></tr>`).join('')}
            ${recent.length===0?'<tr><td colspan="6" class="text-center py-4">No complaints</td></tr>':''}</tbody></table></div>`;
        }

        // Simulate real-time updates by re-rendering every 2 seconds (but only if data changed)
        let lastComplaintsHash = "";
        function checkAndUpdate() {
            const newHash = JSON.stringify(complaints);
            if(newHash !== lastComplaintsHash) {
                lastComplaintsHash = newHash;
                updateDashboard();
            }
        }
        if(unsubscribeTimer) clearInterval(unsubscribeTimer);
        unsubscribeTimer = setInterval(() => {
            checkAndUpdate();
        }, 1000);
        updateDashboard();

        container.innerHTML = `
            <div class="space-y-8">
                <div class="flex justify-between items-center"><h2 class="text-3xl font-black"><i class="fas fa-chart-pie text-orange-500"></i> HOD Analytics Dashboard</h2>
                <button id="exportAllBtn" class="bg-emerald-500 text-white px-5 py-2 rounded-2xl shadow"><i class="fas fa-download"></i> Export All Complaints</button></div>
                <div id="hodStats"></div>
                <div class="grid md:grid-cols-2 gap-6"><div class="luxury-card p-5"><h3 class="font-bold mb-3">📈 Complaint Trend (Last 7 Days)</h3><canvas id="trendChart" height="200"></canvas></div>
                <div class="luxury-card p-5"><h3 class="font-bold mb-3">🥧 Priority Distribution</h3><canvas id="priorityChart" height="200"></canvas></div></div>
                <div class="luxury-card p-5"><h3 class="font-bold mb-3">📋 Recent Complaints</h3><div id="recentTable"></div></div>
            </div>
        `;
        document.getElementById("exportAllBtn")?.addEventListener("click", () => {
            if(!complaints.length) return alert("No complaints");
            let csv = [["ID","Title","Description","Assignee","Designation","Priority","Status","Created Date","Due Date"]];
            complaints.forEach(c => { const u = getUserById(c.assignedTo); csv.push([c.id, c.title, c.description, u.fullName, u.designation, c.priority, c.status, new Date(c.createdDate).toLocaleString(), c.dueDate||'N/A']); });
            const blob = new Blob([csv.map(row=>row.join(",")).join("\n")], {type:"text/csv"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `all_complaints_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        });
    }

    // ---------- SSE DASHBOARD (self-assign) ----------
    function renderSSEDashboard(container) {
        const myComplaints = complaints.filter(c => c.assignedTo === currentUser.uid);
        function updateStatus(compId, newStatus) {
            const idx = complaints.findIndex(c => c.id === compId);
            if(idx !== -1) {
                complaints[idx].status = newStatus;
                saveComplaints();
                renderSSEDashboard(container);
            }
        }
        container.innerHTML = `
            <div class="space-y-6">
                <div class="flex flex-wrap justify-between items-center"><h2 class="text-2xl font-black"><i class="fas fa-tasks text-orange-500"></i> My Assigned Tickets</h2>
                <button id="sseNewComplaintBtn" class="btn-luxury text-white px-5 py-2 rounded-2xl"><i class="fas fa-plus-circle"></i> Create & Assign</button></div>
                <div class="luxury-card overflow-hidden">
                    ${myComplaints.length === 0 ? '<div class="p-10 text-center text-gray-400">No complaints assigned yet.</div>' : `
                    <table class="min-w-full"><thead class="bg-orange-50"><tr><th class="p-4">ID</th><th>Title</th><th>Priority</th><th>Status</th><th>Created</th><th>Update</th></tr></thead><tbody>
                    ${myComplaints.map(c => `<tr class="border-b"><td class="p-4 text-xs">${c.id.slice(0,6)}</td><td><div class="font-medium">${escapeHtml(c.title)}</div><div class="text-xs text-gray-400">${escapeHtml(c.description.substring(0,50))}</div></td><td>${priorityBadge(c.priority)}</td><td>${statusBadge(c.status)}</td><td class="text-xs">${new Date(c.createdDate).toLocaleDateString()}</td>
                    <td><select data-id="${c.id}" class="statusSelect border rounded-lg p-1"><option ${c.status==='open'?'selected':''}>open</option><option ${c.status==='in-progress'?'selected':''}>in-progress</option><option ${c.status==='resolved'?'selected':''}>resolved</option><option ${c.status==='closed'?'selected':''}>closed</option></select></td></tr>`).join('')}</tbody></table>`}
                </div>
            </div>
        `;
        document.querySelectorAll(".statusSelect").forEach(sel => sel.addEventListener("change", (e) => { updateStatus(sel.dataset.id, sel.value); }));
        document.getElementById("sseNewComplaintBtn")?.addEventListener("click", () => openComplaintModal());
    }

    // ---------- SHARED COMPLAINT MODAL (assign to any SSE/HOD, including self) ----------
    function openComplaintModal(complaint = null) {
        const isEdit = !!complaint;
        const sseList = users.filter(u => u.role === "sse" || u.role === "hod");
        const modalDiv = document.createElement("div");
        modalDiv.className = "fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 backdrop-blur-sm";
        modalDiv.innerHTML = `
            <div class="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl border-t-4 border-orange-500">
                <div class="flex justify-between border-b pb-3 mb-4"><h3 class="text-xl font-bold">${isEdit ? 'Edit Complaint' : 'New Complaint'}</h3><button id="closeModalBtn"><i class="fas fa-times text-gray-400"></i></button></div>
                <form id="modalComplaintForm"><input type="hidden" id="compId" value="${complaint?.id||''}">
                    <div class="mb-3"><label>Title *</label><input type="text" id="compTitle" required class="w-full border rounded-xl p-2" value="${escapeHtml(complaint?.title||'')}"></div>
                    <div class="mb-3"><label>Description</label><textarea id="compDesc" rows="2" class="w-full border rounded-xl p-2">${escapeHtml(complaint?.description||'')}</textarea></div>
                    <div class="mb-3"><label>Assign to (SSE/HOD)</label><select id="compAssignedTo" class="w-full border rounded-xl p-2">
                        ${sseList.map(s => `<option value="${s.uid}" ${complaint && complaint.assignedTo === s.uid ? 'selected':''}>${s.fullName} (${s.designation})</option>`).join('')}
                        ${sseList.length===0?'<option disabled>No users</option>':''}
                    </select></div>
                    <div class="mb-3"><label>Priority</label><select id="compPriority" class="w-full border rounded-xl p-2"><option ${complaint?.priority==='low'?'selected':''}>low</option><option ${complaint?.priority==='medium'?'selected':''}>medium</option><option ${complaint?.priority==='high'?'selected':''}>high</option><option ${complaint?.priority==='critical'?'selected':''}>critical</option></select></div>
                    <div class="mb-3"><label>Status</label><select id="compStatus" class="w-full border rounded-xl p-2"><option ${complaint?.status==='open'?'selected':''}>open</option><option ${complaint?.status==='in-progress'?'selected':''}>in-progress</option><option ${complaint?.status==='resolved'?'selected':''}>resolved</option><option ${complaint?.status==='closed'?'selected':''}>closed</option></select></div>
                    <div class="mb-4"><label>Due Date</label><input type="date" id="compDueDate" class="w-full border rounded-xl p-2" value="${complaint?.dueDate?.split('T')[0]||''}"></div>
                    <div class="flex justify-end gap-3"><button type="button" id="cancelModal" class="px-4 py-2 border rounded-xl">Cancel</button><button type="submit" class="bg-orange-500 text-white px-5 py-2 rounded-xl">${isEdit ? 'Update' : 'Create'}</button></div>
                </form>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const close = () => modalDiv.remove();
        document.getElementById("closeModalBtn")?.addEventListener("click", close);
        document.getElementById("cancelModal")?.addEventListener("click", close);
        document.getElementById("modalComplaintForm")?.addEventListener("submit", (e) => {
            e.preventDefault();
            const id = document.getElementById("compId").value;
            const data = {
                title: document.getElementById("compTitle").value,
                description: document.getElementById("compDesc").value,
                assignedTo: document.getElementById("compAssignedTo").value,
                priority: document.getElementById("compPriority").value,
                status: document.getElementById("compStatus").value,
                dueDate: document.getElementById("compDueDate").value || null,
                createdDate: complaint?.createdDate || new Date().toISOString(),
                id: id ? id : "comp_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6)
            };
            if (id) {
                const index = complaints.findIndex(c => c.id === id);
                if(index !== -1) complaints[index] = { ...complaints[index], ...data };
            } else {
                complaints.push(data);
            }
            saveComplaints();
            close();
            renderCurrentView();
        });
    }

    // ---------- INITIALIZATION ----------
    loadData();
    if(restoreSession()) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("dashboardScreen").classList.remove("hidden");
        document.getElementById("userFullname").innerText = currentUser.fullName;
        document.getElementById("userRoleText").innerHTML = currentUser.designation;
        document.getElementById("roleBadge").innerHTML = currentUser.role === "admin" ? '<i class="fas fa-crown"></i> Admin' : (currentUser.role === "hod" ? '<i class="fas fa-chart-line"></i> HOD' : `<i class="fas fa-microchip"></i> ${currentUser.designation}`);
        renderCurrentView();
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        if(login(email, password)) {
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("dashboardScreen").classList.remove("hidden");
            document.getElementById("userFullname").innerText = currentUser.fullName;
            document.getElementById("userRoleText").innerHTML = currentUser.designation;
            document.getElementById("roleBadge").innerHTML = currentUser.role === "admin" ? '<i class="fas fa-crown"></i> Admin' : (currentUser.role === "hod" ? '<i class="fas fa-chart-line"></i> HOD' : `<i class="fas fa-microchip"></i> ${currentUser.designation}`);
            renderCurrentView();
        } else {
            alert("Invalid email or password. Use admin@mpexpress.com / 543210");
        }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
        if(unsubscribeTimer) clearInterval(unsubscribeTimer);
        logout();
        document.getElementById("dashboardScreen").classList.add("hidden");
        document.getElementById("loginScreen").classList.remove("hidden");
    });
</script>
</body>
</html>
