<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval System - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Create New Account</h2>
            <div id="alert" class="alert"></div>
            <form id="registerForm" onsubmit="registerUser(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" required>
                        <option value="IT_Executive">IT Executive</option>
                        <option value="Assistant_Manager">Assistant Manager</option>
                        <option value="HOD_IT">HOD IT</option>
                        <option value="Account_Officer">Account Officer</option>
                    </select>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            <div class="link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { registerUser } from './js/auth.js';
        window.registerUser = registerUser;
    </script>
</body>
</html>
